<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Prophetly</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#080b12; --surface:#0e1420; --raised:#131a28;
      --border:rgba(255,255,255,0.06); --accent:#e8ff57;
      --green:#57ffa8; --red:#ff6b6b; --blue:#57a8ff; --purple:#c57fff;
      --text:#f0f2f8; --muted:#4a5568; --sub:#8892a4;
    }
    html{height:100%}
    body{min-height:100%;background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;padding-bottom:100px}
    body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");opacity:.5}
    .blob{position:fixed;border-radius:50%;filter:blur(100px);pointer-events:none;z-index:0}
    .blob-1{width:500px;height:500px;background:rgba(232,255,87,0.04);top:-200px;right:-100px}
    .blob-2{width:400px;height:400px;background:rgba(87,160,255,0.04);bottom:-100px;left:-80px}
    @keyframes fadeDown{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
    @keyframes popIn{from{opacity:0;transform:scale(0.93)}to{opacity:1;transform:scale(1)}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
    @keyframes shimmer{from{background-position:200% 0}to{background-position:-200% 0}}
    @keyframes slideIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    @keyframes winFlash{0%{opacity:0}30%{opacity:1}100%{opacity:0}}
    @keyframes winNum{0%{opacity:0;transform:translateX(-50%) scale(.7)}40%{opacity:1;transform:translateX(-50%) scale(1.15)}100%{opacity:0;transform:translateX(-50%) translateY(-60px) scale(1)}}
    @keyframes confetti{0%{transform:translate(-50%,-50%) scale(1);opacity:1}100%{transform:translate(calc(-50% + var(--tx)),calc(-50% + var(--ty))) scale(0);opacity:0}}

    /* NAV.  no */
    nav{position:sticky;top:0;z-index:200;background:rgba(8,11,18,0.9);backdrop-filter:blur(20px);
      border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;
      justify-content:space-between;height:60px;animation:fadeDown .4s ease both}
    .logo-wrap{display:flex;align-items:center;gap:10px}
    /* PLACEHOLDER: swap .logo-icon-placeholder for <img src="assets/logo.svg" width="30"> */
    .logo-icon-placeholder{width:30px;height:30px;border-radius:8px;
      background:linear-gradient(135deg,var(--accent),var(--green));
      display:grid;place-items:center;font-size:14px;flex-shrink:0}
    .logo{font-family:'Syne',sans-serif;font-weight:800;font-size:18px}
    .logo span{color:var(--accent)}
    .nav-right{display:flex;align-items:center;gap:10px}
    .balance-pill{background:linear-gradient(135deg, rgba(232,255,87,0.1), rgba(87,255,168,0.05));border:1px solid var(--border);border-radius:100px;
      padding:6px 14px;font-size:14px;font-weight:600;display:flex;align-items:center;gap:6px;
      transition:border-color .35s,box-shadow .35s}
    .balance-pill.flash{border-color:rgba(232,255,87,.6);box-shadow:0 0 12px rgba(232,255,87,.15)}
    .balance-pill .amt{color:var(--accent);font-family:'Syne',sans-serif}
    .chat-toggle-btn{width:36px;height:36px;border-radius:10px;background:var(--raised);
      border:1px solid var(--border);display:grid;place-items:center;cursor:pointer;
      font-size:16px;transition:all .2s;position:relative}
    .chat-toggle-btn:hover{border-color:rgba(255,255,255,.2)}
    .chat-dot{position:absolute;top:5px;right:5px;width:7px;height:7px;border-radius:50%;
      background:var(--green);border:1.5px solid var(--bg)}
    /* PLACEHOLDER: swap .avatar span for <img src="[user.avatar_url]"> */
    .avatar{width:34px;height:34px;border-radius:50%;
      background:linear-gradient(135deg,var(--accent),#57ffa8);
      display:grid;place-items:center;font-size:13px;font-weight:700;color:#080b12;
      cursor:pointer;flex-shrink:0;position:relative}
    .avatar-menu{position:absolute;top:calc(100% + 10px);right:0;background:var(--surface);
      border:1px solid var(--border);border-radius:12px;padding:6px;min-width:165px;z-index:300;
      box-shadow:0 16px 40px rgba(0,0,0,.55);display:none}
    .avatar-menu.open{display:block;animation:popIn .18s ease}
    .avatar-menu a,.avatar-menu button{display:flex;align-items:center;gap:8px;width:100%;
      text-align:left;padding:9px 12px;border-radius:8px;font-size:13px;font-weight:500;
      color:var(--sub);background:none;border:none;cursor:pointer;text-decoration:none;
      transition:background .15s,color .15s;font-family:'Outfit',sans-serif}
    .avatar-menu a:hover,.avatar-menu button:hover{background:var(--raised);color:var(--text)}
    .avatar-menu .danger{color:var(--red)}
    .avatar-menu .danger:hover{background:rgba(255,107,107,.08)}

    /* MAIN */
    main{max-width:700px;margin:0 auto;padding:28px 18px 0;position:relative;z-index:1}
    .hero{margin-bottom:24px;animation:fadeUp .45s .05s ease both}
    .hero-date{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
    .hero-title{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;line-height:1.15}
    .hero-title em{color:var(--accent);font-style:normal}
    .hero-sub{font-size:14px;color:var(--sub);margin-top:6px;font-weight:400}

    /* CATEGORIES */
    /* PLACEHOLDER: swap emoji inside .cat-btn for <img src="assets/icons/[cat].svg" class="cat-icon" width="14"> */
    .cat-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;
      margin-bottom:22px;animation:fadeUp .45s .1s ease both}
    .cat-row::-webkit-scrollbar{display:none}
    .cat-btn{flex-shrink:0;padding:7px 15px;background:var(--surface);border:1px solid var(--border);
      border-radius:100px;color:var(--sub);font-family:'Outfit',sans-serif;font-size:13px;
      font-weight:500;cursor:pointer;transition:all .2s;white-space:nowrap;display:flex;align-items:center;gap:5px}
    .cat-btn:hover{border-color:rgba(255,255,255,.15);color:var(--text)}
    .cat-btn.active{background:var(--accent);border-color:var(--accent);color:#080b12;font-weight:600}
    .section-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;
      letter-spacing:1px;margin-bottom:12px}

    /* PREDICTION CARDS */
    .predictions{display:flex;flex-direction:column;gap:14px;margin-bottom:32px}
    .pred-card{background:var(--surface);border:1px solid var(--border);border-radius:18px;
      overflow:hidden;transition:border-color .2s,box-shadow .2s;animation:fadeUp .4s ease both}
    .pred-card:hover{border-color:rgba(255,255,255,.11);box-shadow:0 8px 32px rgba(0,0,0,.3);transform:translateY(-2px)}
    .pred-card.is-voted{border-color:rgba(255,255,255,.07)}
    .pred-card.is-submitting{pointer-events:none;opacity:.8}
    .pred-inner{padding:20px}
    .pred-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
    .pred-cat{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;
      padding:3px 9px;border-radius:100px;display:flex;align-items:center;gap:4px}
    .cat-weather{background:rgba(87,168,255,.12);color:var(--blue);border:1px solid rgba(87,168,255,.2)}
    .cat-sports{background:rgba(87,255,168,.1);color:var(--green);border:1px solid rgba(87,255,168,.2)}
    .cat-dumb{background:rgba(232,255,87,.1);color:var(--accent);border:1px solid rgba(232,255,87,.2)}
    .cat-finance{background:rgba(255,107,107,.1);color:var(--red);border:1px solid rgba(255,107,107,.2)}
    .cat-tech{background:rgba(180,87,255,.1);color:var(--purple);border:1px solid rgba(180,87,255,.2)}
    .pred-odds{font-size:12px;color:var(--muted)}
    .pred-odds strong{color:var(--text);font-family:'Syne',sans-serif}
    .pred-question{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;line-height:1.3;margin-bottom:6px}
    .pred-desc{font-size:13px;color:var(--sub);margin-bottom:16px;line-height:1.5}
    .pred-stats{display:flex;gap:14px;margin-bottom:16px;flex-wrap:wrap}
    .pred-stat{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:4px}
    .pred-stat strong{color:var(--sub);font-weight:500}

    /* HEAT BAR */
    .heat-bar-wrap{margin-bottom:14px}
    .heat-bar{height:5px;background:rgba(255,107,107,.2);border-radius:100px;overflow:hidden;margin-bottom:6px}
    .heat-yes{height:100%;background:linear-gradient(to right,var(--green),rgba(87,255,168,.6));border-radius:100px;transition:width .4s ease}
    .heat-labels{display:flex;justify-content:space-between;font-size:11px;font-weight:600}
    .heat-yes-label{color:var(--green)}
    .heat-no-label{color:var(--red)}

    /* YES/NO buttons */
    .vote-row{display:flex;gap:8px;margin-bottom:14px}
    .vote-btn{flex:1;padding:10px;border-radius:10px;border:1px solid var(--border);
      background:var(--raised);color:var(--sub);font-family:'Outfit',sans-serif;
      font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;text-align:center}
    .vote-btn:hover:not(:disabled){transform:translateY(-1px)}
    .vote-btn.yes:hover:not(:disabled){background:rgba(87,255,168,.12);border-color:rgba(87,255,168,.4);color:var(--green)}
    .vote-btn.no:hover:not(:disabled){background:rgba(255,107,107,.1);border-color:rgba(255,107,107,.4);color:var(--red)}
    .vote-btn.selected-yes{background:rgba(87,255,168,.15);border-color:rgba(87,255,168,.6);color:var(--green);font-weight:700;box-shadow:0 0 10px rgba(87,255,168,0.1)}
    .vote-btn.selected-no{background:rgba(255,107,107,.12);border-color:rgba(255,107,107,.6);color:var(--red);font-weight:700;box-shadow:0 0 10px rgba(255,107,107,0.1)}
    .vote-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}

    /* Wager section */
    .wager-section{background:var(--raised);border-radius:12px;padding:14px;margin-bottom:12px;
      animation:slideIn .22s ease both}
    .wager-section.hidden{display:none}
    .wager-top{display:flex;align-items:center;gap:8px;margin-bottom:10px}
    .wager-label{font-size:12px;color:var(--muted);font-weight:500;flex-shrink:0}
    .wager-input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:8px;
      padding:8px 12px;color:var(--text);font-family:'Outfit',sans-serif;font-size:14px;
      font-weight:600;outline:none;transition:border-color .2s}
    .wager-input::placeholder{color:var(--muted);font-weight:400}
    .wager-input:focus{border-color:rgba(232,255,87,.35)}
    .wager-quick{display:flex;gap:5px}
    .wager-quick button{flex:1;padding:6px 0;background:var(--surface);border:1px solid var(--border);
      border-radius:7px;color:var(--sub);font-size:11px;font-weight:600;cursor:pointer;
      transition:all .15s;font-family:'Outfit',sans-serif}
    .wager-quick button:hover{background:rgba(232,255,87,.08);border-color:rgba(232,255,87,.3);color:var(--accent)}
    .payout-preview{display:flex;align-items:center;justify-content:space-between;
      padding-top:10px;margin-top:10px;border-top:1px solid var(--border);font-size:12px;color:var(--muted)}
    .payout-val{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--green)}

    /* BET button */
    .bet-btn{width:100%;padding:13px;border-radius:11px;background:var(--accent);border:none;
      color:#080b12;font-family:'Syne',sans-serif;font-size:14px;font-weight:800;cursor:pointer;
      transition:opacity .2s,transform .15s,box-shadow .2s;box-shadow:0 4px 24px rgba(232,255,87,.2);
      display:flex;align-items:center;justify-content:center;gap:8px}
    .bet-btn:hover:not(:disabled){opacity:.9;transform:translateY(-1px);box-shadow:0 8px 32px rgba(232,255,87,.3)}
    .bet-btn:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}
    .bet-btn.hidden{display:none}
    .btn-spinner{width:14px;height:14px;border:2px solid rgba(8,11,18,.3);border-top-color:#080b12;
      border-radius:50%;animation:spin .7s linear infinite;display:none}
    .bet-btn.loading .btn-spinner{display:inline-block}
    .bet-btn.loading .btn-text{display:none}

    /* Voted banner */
    .voted-banner{background:var(--raised);border-top:1px solid var(--border);padding:14px 20px;
      display:flex;align-items:center;justify-content:space-between;gap:12px}
    .voted-badge{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600}
    .voted-badge.yes .vb-label{color:var(--green)}
    .voted-badge.no .vb-label{color:var(--red)}
    .voted-amount{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--accent)}
    .voted-status{font-size:11px;color:var(--muted);margin-top:3px}

    /* LEADERBOARD */
    .lb-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;
      overflow:hidden;margin-bottom:32px;animation:fadeUp .45s .25s ease both}
    .lb-header{padding:16px 20px;border-bottom:1px solid var(--border);
      display:flex;align-items:center;justify-content:space-between}
    .lb-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:700}
    .lb-sub{font-size:12px;color:var(--muted)}
    .lb-row{display:flex;align-items:center;gap:14px;padding:13px 20px;
      border-bottom:1px solid rgba(255,255,255,.03);transition:background .15s}
    .lb-row:last-child{border-bottom:none}
    .lb-row:hover{background:var(--raised)}
    .lb-row.me{background:rgba(232,255,87,.04);border:1px solid rgba(232,255,87,0.2);border-radius:8px}
    .lb-rank{width:24px;text-align:center;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--muted);flex-shrink:0}
    .lb-rank.gold{color:#ffd700}.lb-rank.silver{color:#c0c0c0}.lb-rank.bronze{color:#cd7f32}
    /* PLACEHOLDER: swap .lb-avatar for <img src="[avatar_url]"> */
    .lb-avatar{width:32px;height:32px;border-radius:50%;flex-shrink:0;display:grid;
      place-items:center;font-size:12px;font-weight:700;color:#080b12}
    .lb-name{flex:1;font-size:14px;font-weight:500}
    .lb-name .you{font-size:11px;color:var(--accent);margin-left:6px}
    .lb-stats{text-align:right}
    .lb-bal{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--accent)}
    .lb-wr{font-size:11px;color:var(--muted)}

    /* CHAT PANEL
     * REAL-TIME UPGRADE PATH:
     * 1. Table: chat_messages(id uuid, user_id uuid, username text, text text, created_at timestamptz, type text)
     * 2. Load: supabase.from('chat_messages').select('*').order('created_at').limit(50)
     * 3. Subscribe: supabase.channel('chat').on('postgres_changes',{event:'INSERT',...}, cb).subscribe()
     * 4. Send: supabase.from('chat_messages').insert({user_id, username, text, type:'message'})
     * 5. Delete pushFakeReply() — real replies auto-arrive via subscription
     */
    .chat-panel{position:fixed;right:0;bottom:0;top:60px;width:320px;z-index:150;
      background:var(--surface);border-left:1px solid var(--border);
      display:flex;flex-direction:column;
      transform:translateX(100%);transition:transform .3s cubic-bezier(.22,1,.36,1)}
    .chat-panel.open{transform:translateX(0)}
    .chat-header{padding:16px 18px;border-bottom:1px solid var(--border);
      display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
    .chat-header-left{display:flex;align-items:center;gap:10px}
    .chat-live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
    .chat-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700}
    .chat-online{font-size:11px;color:var(--muted)}
    .chat-close{background:none;border:none;color:var(--muted);cursor:pointer;
      font-size:20px;padding:2px 6px;line-height:1;transition:color .15s}
    .chat-close:hover{color:var(--text)}
    .chat-messages{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;
      gap:10px;scrollbar-width:thin;scrollbar-color:var(--raised) transparent}
    .chat-messages::-webkit-scrollbar{width:4px}
    .chat-messages::-webkit-scrollbar-thumb{background:var(--raised);border-radius:4px}
    .chat-msg{display:flex;gap:9px;animation:fadeUp .2s ease both}
    .chat-msg.mine{flex-direction:row-reverse}
    /* PLACEHOLDER: swap .chat-avatar for <img src="[avatar_url]"> */
    .chat-avatar{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:grid;
      place-items:center;font-size:11px;font-weight:700;color:#080b12}
    .chat-bubble-wrap{display:flex;flex-direction:column;gap:3px;max-width:76%}
    .chat-msg.mine .chat-bubble-wrap{align-items:flex-end}
    .chat-username{font-size:10px;color:var(--muted);font-weight:500;padding:0 4px}
    .chat-bubble{background:var(--raised);border-radius:12px 12px 12px 3px;padding:9px 12px;
      font-size:13px;line-height:1.45;color:var(--text);word-break:break-word}
    .chat-bubble.fire-bubble{background:rgba(255,168,57,.08);border:1px solid rgba(255,168,57,.18)}
    .chat-msg.mine .chat-bubble{background:rgba(232,255,87,.1);border-radius:12px 12px 3px 12px}
    .chat-msg.bet-announce .chat-bubble{background:rgba(87,255,168,.07);
      border:1px solid rgba(87,255,168,.15);font-size:12px;color:var(--sub)}
    .chat-ts{font-size:10px;color:var(--muted);padding:0 4px}
    .chat-date-chip{text-align:center;font-size:10px;color:var(--muted);position:relative;margin:4px 0}
    .chat-date-chip span{background:var(--surface);padding:0 10px;position:relative;z-index:1}
    .chat-date-chip::before{content:'';position:absolute;left:0;right:0;top:50%;
      border-top:1px solid var(--border);z-index:0}
    .chat-input-wrap{padding:12px 14px;border-top:1px solid var(--border);
      display:flex;gap:8px;flex-shrink:0}
    .chat-input{flex:1;background:var(--raised);border:1px solid var(--border);border-radius:10px;
      padding:9px 13px;color:var(--text);font-family:'Outfit',sans-serif;font-size:13px;
      outline:none;transition:border-color .2s}
    .chat-input::placeholder{color:var(--muted)}
    .chat-input:focus{border-color:rgba(232,255,87,.3)}
    /* PLACEHOLDER: swap .chat-send inner emoji for <img src="assets/icons/send.svg"> */
    .chat-send{width:36px;height:36px;border-radius:10px;background:var(--accent);border:none;
      color:#080b12;font-size:15px;cursor:pointer;display:grid;place-items:center;
      flex-shrink:0;transition:opacity .2s,transform .15s}
    .chat-send:hover{opacity:.88;transform:scale(1.05)}

    /* TOAST */
    #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);
      background:var(--surface);border:1px solid var(--border);border-radius:10px;
      padding:11px 20px;font-size:13px;font-weight:500;color:var(--text);
      box-shadow:0 8px 32px rgba(0,0,0,.5);z-index:9999;
      transition:transform .3s cubic-bezier(.22,1,.36,1);white-space:nowrap;pointer-events:none}
    #toast.show{transform:translateX(-50%) translateY(0)}
    #toast.win{color:var(--green);border-color:rgba(87,255,168,.3)}
    #toast.loss{color:var(--red);border-color:rgba(255,107,107,.3)}
    #toast.info{color:var(--accent);border-color:rgba(232,255,87,.3)}

    /* ── SVG icon system ── */
    .icon{display:inline-block;vertical-align:middle;flex-shrink:0}
    /* nav wallet */
    .nav-balance .icon{width:13px;height:13px;filter:invert(1) brightness(.6);margin-right:2px;position:relative;top:-1px}
    /* logo zap */
    .logo-icon-placeholder .icon{width:18px;height:18px;filter:brightness(0) invert(0)}
    /* avatar menu icons */
    .avatar-menu .menu-icon{width:14px;height:14px;filter:invert(1) brightness(.55);flex-shrink:0}
    /* category button icons */
    .cat-icon{width:13px;height:13px;filter:invert(1) brightness(.55);flex-shrink:0;transition:filter .2s}
    .cat-btn.active .cat-icon{filter:brightness(0) invert(0)}
    .cat-btn:hover:not(.active) .cat-icon{filter:invert(1) brightness(.75)}
    /* pred-cat badge icons */
    .badge-icon{width:11px;height:11px;flex-shrink:0}
    .cat-weather .badge-icon{filter:invert(62%) sepia(80%) saturate(500%) hue-rotate(190deg)}
    .cat-sports  .badge-icon{filter:invert(85%) sepia(40%) saturate(400%) hue-rotate(100deg)}

<script type="module">

  const supabase = createClient(

    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlqZWVkZ2N2ZWF3dGVyZnB2bnVjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0MzU3MjYsImV4cCI6MjA5MjAxMTcyNn0.nAcKJcUjVZW8-qrPm3n9XDvoqUm4jcD3srZwJkPuUBU",

  /* PROFILE */

    if (!data) {
      const { data: c } = await supabase.from("profiles")

        .select().single();
      profile = c;
    } else { profile = data; }
    renderBalance();
    renderAvatar();
    renderStreak();
  }
  function renderStreak() {
    const streak = profile?.streak ?? 0;
    const existing = document.getElementById("streakBadge");
    if (streak >= 2) {
      if (!existing) {
        const badge = document.createElement("div");
        badge.id = "streakBadge";
        badge.style.cssText = "font-size:13px;color:var(--accent);font-weight:600;margin-top:4px;animation:fadeUp .3s ease both";
        badge.textContent = `🔥 ${streak} win streak`;
        document.querySelector(".hero").appendChild(badge);
      } else {
        existing.textContent = `🔥 ${streak} win streak`;
        existing.style.display = "";
      }
    } else if (existing) {
      existing.style.display = "none";
    }
  }
  function renderBalance(flash = false) {
    if (!profile) return;
    document.getElementById("navBalance").textContent = "$" + Number(profile.balance).toLocaleString();
    if (flash) {
      const p = document.getElementById("balancePill");
      p.classList.add("flash"); setTimeout(() => p.classList.remove("flash"), 700);
    }
  }

  /* NAV */
  function renderAvatar() {
    const name = profile?.username || user.email?.split("@")[0] || "?";
    const img  = document.getElementById("avatarImg");
    const init = document.getElementById("avatarInitial");
    if (profile?.avatar_url) {
      img.src = profile.avatar_url;
      img.style.display = "block";
      init.style.display = "none";
    } else {
      img.style.display = "none";
      init.style.display = "";
      init.textContent = name[0].toUpperCase();
    }
  }
  renderAvatar();
  document.getElementById("avatarBtn").addEventListener("click", e => {
    e.stopPropagation(); document.getElementById("avatarMenu").classList.toggle("open");
  });
  document.addEventListener("click", () => document.getElementById("avatarMenu").classList.remove("open"));
  document.getElementById("logoutBtn").addEventListener("click", async () => {
    await supabase.auth.signOut(); window.location.replace("login.html");
  });
  document.getElementById("heroDate").textContent = new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"});

  /* TOAST */
  const toastEl = document.getElementById("toast");
  let tt;
  function showToast(msg, type = "") {
    toastEl.className = type; toastEl.textContent = msg;
    void toastEl.offsetWidth; toastEl.classList.add("show");
    clearTimeout(tt); tt = setTimeout(() => toastEl.classList.remove("show"), 3500);
  }

  /* PREDICTIONS */
  let PREDICTIONS = [];
  const FALLBACK = [
    { id:"p1", category:"weather",  question:"Will it rain in NYC today?",                         desc:"Measurable precipitation before midnight?",               yes_pct:62, total_bets:1847, closes_in:"4h 20m", multiplier:1.6  },
    { id:"p2", category:"sports",   question:"Will the Lakers win tonight?",                       desc:"Lakers vs Celtics. LeBron questionable.",                 yes_pct:45, total_bets:3204, closes_in:"6h",     multiplier:2.2  },
    { id:"p3", category:"dumb",     question:"Will Elon tweet something wild before noon?",        desc:"Historically 80% of days. You know the deal.",           yes_pct:81, total_bets:9102, closes_in:"2h 45m", multiplier:1.2  },
    { id:"p4", category:"finance",  question:"Will BTC close above $70k today?",                   desc:"Bitcoin near resistance. Bulls vs bears.",                yes_pct:38, total_bets:5670, closes_in:"8h",     multiplier:2.6  },
    { id:"p5", category:"tech",     question:"Will Apple announce something at WWDC?",             desc:"Leaks suggest a major AI drop. Will it land?",            yes_pct:73, total_bets:2100, closes_in:"3d",     multiplier:1.4  },
    { id:"p6", category:"dumb",     question:"Will someone leave a 1★ on a 5★ restaurant today?", desc:"Gary does this daily. Clockwork. 💀",                    yes_pct:92, total_bets:422,  closes_in:"12h",    multiplier:1.08 },
    { id:"p7", category:"sports",   question:"Walk-off home run in MLB today?",                    desc:"Any game. Walk-off homer in 9th or later.",              yes_pct:29, total_bets:1388, closes_in:"10h",    multiplier:3.4  },
    { id:"p8", category:"weather",  question:"Will it snow anywhere in Florida today?",            desc:"All 67 counties count. Even the panhandle.",             yes_pct:3,  total_bets:887,  closes_in:"12h",    multiplier:33   },
  ];

  async function loadPredictions() {
    const { data, error } = await supabase.from("predictions").select("*");
    PREDICTIONS = (data && data.length) ? data : FALLBACK;
    if (error) console.warn("predictions table not found — using fallback data");
    renderPredictions();
  }

  /* MY BETS */
  let myBets = {};
  async function loadMyBets() {
    const { data, error } = await supabase.from("bets")
      .select("prediction_id,choice,amount,status,payout").eq("user_id", user.id);
    if (error) { console.error("bets:", error.message); return; }
    myBets = {};
    (data || []).forEach(b => { myBets[b.prediction_id] = b; });
  }

  /* CATEGORY FILTER */
  let activeCat = "all";
  document.getElementById("catRow").addEventListener("click", e => {
    const btn = e.target.closest(".cat-btn"); if (!btn) return;
    document.querySelectorAll(".cat-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active"); activeCat = btn.dataset.cat; renderPredictions();
  });

  const CAT_CLASS = {weather:"cat-weather",sports:"cat-sports",dumb:"cat-dumb",finance:"cat-finance",tech:"cat-tech"};
  const CAT_LABEL = {
    weather:`<img src="/assets/icons/cloud-lightning.svg" class="badge-icon"> Weather`,
    sports: `<img src="/assets/icons/sport-shoe.svg" class="badge-icon"> Sports`,
    dumb:   `<img src="/assets/icons/skull.svg" class="badge-icon"> Dumb Stuff`,
    finance:`<img src="/assets/icons/badge-dollar-sign.svg" class="badge-icon"> Finance`,
    tech:   `<img src="/assets/icons/cpu.svg" class="badge-icon"> Tech`
  };

  /* Track YES/NO choice before hitting BET */
  const pendingChoice = {};

  /* RENDER PREDICTIONS */
  function renderPredictions() {
    const list = document.getElementById("predList");
    const show = activeCat === "all" ? PREDICTIONS : PREDICTIONS.filter(p => p.category === activeCat);
    if (!show.length) { list.innerHTML = `<div class="empty">No predictions right now… check back later 👀</div>`; return; }

    list.innerHTML = show.map((p, i) => {
      const bet    = myBets[p.id];
      const voted  = !!bet;
      const choice = pendingChoice[p.id] || null;
      const bal    = profile?.balance ?? 1000;

      // Compute time left
      const timeLeft = (() => {
        if (!p.closes_at) return "—";
        const diff = new Date(p.closes_at) - new Date();
        if (diff <= 0) return "Closed";
        const h = Math.floor(diff / 3600000);
        const m = Math.floor((diff % 3600000) / 60000);
        return h > 0 ? `${h}h ${m}m` : `${m}m`;
      })();

      const yesPct = p.yes_pct ?? 50;
      const noPct  = 100 - yesPct;

      return `<div class="pred-card${voted ? " is-voted" : ""}" id="card-${p.id}" style="animation-delay:${i * .05}s">
        <div class="pred-inner">

          <div class="pred-meta">
            <span class="pred-cat ${CAT_CLASS[p.category] || "cat-dumb"}">${CAT_LABEL[p.category] || p.category}</span>
            <span class="pred-odds">YES ×<strong>${p.yes_multiplier ?? p.multiplier ?? 1}</strong> · NO ×<strong>${p.no_multiplier ?? 1.3}</strong></span>
          </div>

          <div class="pred-question">${p.question}</div>
          <div class="pred-desc">${p.desc}</div>

          <div class="pred-stats">
            <span class="pred-stat"><img src="/assets/icons/user.svg" class="stat-icon"> <strong>${Number(p.total_bets).toLocaleString()}</strong> bets</span>
            <span class="pred-stat"><img src="/assets/icons/hourglass.svg" class="stat-icon"> <strong>${timeLeft}</strong> left</span>
          </div>

          <div class="heat-bar-wrap">
            <div class="heat-bar">
              <div class="heat-yes" style="width:${yesPct}%"></div>
            </div>
            <div class="heat-labels">
              <span class="heat-yes-label">🟢 YES ${yesPct}%</span>
              <span class="heat-no-label">🔴 NO ${noPct}%</span>
            </div>
          </div>

          ${!voted ? `
          <div class="vote-row">
            <button class="vote-btn yes${choice === "yes" ? " selected-yes" : ""}" data-id="${p.id}" data-vote="yes">
              <img src="/assets/icons/circle-check.svg" class="vote-icon" width="14"> YES
            </button>
            <button class="vote-btn no${choice === "no" ? " selected-no" : ""}" data-id="${p.id}" data-vote="no">
              <img src="/assets/icons/x.svg" class="vote-icon" width="14"> NO
            </button>
          </div>
          <div class="wager-section${choice ? "" : " hidden"}" id="wager-section-${p.id}">
            <div class="wager-top">
              <span class="wager-label">Wager:</span>
              <input class="wager-input" id="wager-${p.id}" type="number" min="1" max="${bal}"
                placeholder="Enter amount ($)" oninput="updatePayout('${p.id}')" />
              <div class="wager-quick">
                <button onclick="quickSet('${p.id}', 50)">$50</button>
                <button onclick="quickSet('${p.id}', 100)">$100</button>
                <button onclick="quickSet('${p.id}', ${bal})">MAX</button>
              </div>
            </div>
            <div class="payout-preview">
              <span>Potential payout</span>
              <span class="payout-val" id="payout-${p.id}">$—</span>
            </div>
          </div>
          <button class="bet-btn${choice ? "" : " hidden"}" id="bet-btn-${p.id}" data-id="${p.id}">
            <div class="btn-spinner"></div>
            <span class="btn-text">Place Bet — ${choice === "yes" ? "YES ✅" : choice === "no" ? "NO ❌" : ""}</span>
          </button>
          ` : ""}

        </div>

        ${voted ? `
        <div class="voted-banner">
          <div>
            <div class="voted-badge ${bet.choice}">
              <img src="assets/icons/${bet.choice === "yes" ? "circle-check" : "x"}.svg" class="vb-icon">
              <span class="vb-label">${bet.choice.toUpperCase()} locked in</span>
            </div>
            <div class="voted-status">${
              bet.status === "won"  ? `<span class="status-won"><img src="/assets/icons/badge-dollar-sign.svg" class="status-icon"> Won · payout <b style="color:var(--green)">$${bet.payout}</b></span>` :
              bet.status === "lost" ? `<span class="status-lost"><img src="/assets/icons/skull.svg" class="status-icon"> Lost · better luck next time</span>` :
                                      `<span class="status-pend"><img src="assets/icons/bolt.svg" class="status-icon"> Pending resolution</span>`
            }</div>
          </div>
          ${bet.amount ? `<div class="voted-amount">$${Number(bet.amount).toLocaleString()}</div>` : ""}
        </div>` : ""}

      </div>`;
    }).join("");

    /* YES/NO choice listener */
    list.querySelectorAll(".vote-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        const id = btn.dataset.id, v = btn.dataset.vote;
        pendingChoice[id] = pendingChoice[id] === v ? null : v;
        if (!pendingChoice[id]) delete pendingChoice[id];
        renderPredictions();
      });
    });

    /* BET button listener */
    list.querySelectorAll(".bet-btn").forEach(btn => {
      btn.addEventListener("click", () => placeBet(btn.dataset.id));
    });
  }

  window.quickSet = (id, amt) => {
    const el = document.getElementById(`wager-${id}`); if (!el) return;
    el.value = Math.min(amt, profile?.balance ?? 0);
    const p = PREDICTIONS.find(x => x.id === id); if (p) updatePayout(id, p.multiplier);
  };
  window.updatePayout = (id) => {
  const el = document.getElementById(`payout-${id}`);
  const inp = document.getElementById(`wager-${id}`);
  if (!el || !inp) return;

  const amt = parseInt(inp.value) || 0;
  const p = PREDICTIONS.find(x => x.id === id);
  const choice = pendingChoice[id];

  if (!choice || !p) {
    el.textContent = "$—";
    return;
  }

  const mult =
    choice === "yes"
      ? (p.yes_multiplier ?? p.multiplier)
      : (p.no_multiplier ?? 1.3); // fallback

  el.textContent = amt > 0
    ? "$" + Math.floor(amt * mult).toLocaleString()
    : "$—";
};

/* Place bet (secure) */
async function placeBet(predId) {
  const choice = pendingChoice[predId];
  const amount = parseInt(document.getElementById(`wager-${predId}`)?.value) || 0;

  if (!choice) {
    showToast("Pick YES or NO first 💀", "loss");
    return;
  }

  if (!amount || amount <= 0) {
    showToast("Enter a valid amount", "loss");
    return;
  }

  if (amount > (profile?.balance ?? 0)) {
    showToast("You're broke 💀", "loss");
    return;
  }

  if (amount > 500) {
    showToast("BIG BET ENERGY 😤", "info");
  }

  const btn = document.getElementById(`bet-btn-${predId}`);
  const card = document.getElementById(`card-${predId}`);

  btn?.classList.add("loading");
  btn.disabled = true;
  card?.classList.add("is-submitting");

  const { error } = await supabase.rpc("place_bet_secure", {
    p_prediction_id: predId,
    p_choice: choice,
    p_amount: amount
  });

  if (error) {
    console.error("bet error:", error);

    showToast(
      error.message?.includes("balance")
        ? "Not enough balance"
        : "Bet failed",
      "loss"
    );

    btn?.classList.remove("loading");
    btn.disabled = false;
    card?.classList.remove("is-submitting");
    return;
  }

  // success — optimistic UI update (instant, no full reload)
  myBets[predId] = { choice, amount, status: "pending", payout: null };
  delete pendingChoice[predId];

  if (profile) {
    profile.balance -= amount;
    renderBalance(true);
  }
  renderPredictions();

  showToast(
    choice === "yes"
      ? `✅ YES locked! -$${amount}`
      : `❌ NO locked! -$${amount}`,
    "loss"
  );

  const betUsername = profile?.username || user.email?.split("@")[0] || "anon";
  const betQuestion = PREDICTIONS.find(p => p.id === predId)?.question || "a prediction";
  const betText = `${choice === "yes" ? "🟢" : "🔴"} ${betUsername} bet ${choice.toUpperCase()} on "${betQuestion.length > 42 ? betQuestion.slice(0,42)+"…" : betQuestion}"${amount ? ` · $${amount}` : ""}`;

  pushChatBetAnnounce(betUsername, choice, betQuestion, amount);

  // Also persist bet announce to DB so other users see it in real-time
  supabase.from("chat_messages").insert({
    user_id: user.id,
    username: betUsername,
    text: betText,
    type: "bet_announce"
  }).then(({ error }) => { if (error) console.warn("bet announce insert failed:", error.message); });
}

  async function loadLeaderboard() {
    const { data } = await supabase.from("profiles")
      .select("id,email,username,avatar_url,balance,total_picks,correct_picks")
      .order("balance",{ascending:false}).limit(10);

        }</div>
        <div class="lb-name">${name}${me?'<span class="you">YOU</span>':""}</div>
        <div class="lb-stats"><div class="lb-bal">$${Number(u.balance).toLocaleString()}</div><div class="lb-wr">${wr} win rate</div></div>
      </div>`;

  }

  /* ══════ GLOBAL CHAT ═════ */
  /* Schema reminder:
     created_at TIMESTAMPTZ DEFAULT NOW(),
     type TEXT DEFAULT 'message' CHECK (type IN ('message', 'bet_announce', 'announcement', 'system'))
  */

const chatPanel = document.getElementById("chatPanel");
const chatMsgs  = document.getElementById("chatMessages");
const chatInput = document.getElementById("chatInput");

document.getElementById("chatOnline").textContent = "live";

document.getElementById("chatToggleBtn").addEventListener("click", () => {
  chatPanel.classList.toggle("open");
  if (chatPanel.classList.contains("open")) {
    scrollBottom();
    chatInput.focus();
  }
});

document.getElementById("chatCloseBtn").addEventListener("click", () => 
  chatPanel.classList.remove("open")
);

// ====================== REAL CHAT LOGIC ======================

let chatLog = [];
let msgId = 200; // fallback only
let lastMsgTime = 0;

function minsAgo(m) { return new Date(Date.now() - m * 60000); }
function fmtTime(d) { 
  return new Date(d).toLocaleTimeString("en-US", { 
    hour: "numeric", 
    minute: "2-digit", 
    hour12: true 
  }); 
}
function esc(s) { 
  return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); 
}

function buildMsgEl(msg) {
  const mine = msg.mine || (msg.user_id === user?.id);
  const colors = ["#e8ff57","#57ffa8","#57a8ff","#ff6b6b","#c57fff","#ffb857"];
  const ci = (msg.username || "?").charCodeAt(0) % colors.length;

  const d = document.createElement("div");
d.className = `chat-msg${mine ? " mine" : ""}${msg.type === "bet_announce" ? " bet-announce" : ""}`;
  d.id = `msg-${msg.id}`;

  const hasFireEmoji = (msg.text || "").includes("🔥");

  d.innerHTML = `
    <div class="chat-avatar" style="background:${colors[ci]};overflow:hidden;padding:0">
      ${msg.avatar_url
        ? `<img src="${msg.avatar_url}" style="width:28px;height:28px;object-fit:cover;border-radius:50%">`
        : `${(msg.username || "?")[0].toUpperCase()}`}
    </div>
    <div class="chat-bubble-wrap">
      <span class="chat-username">${esc(msg.username || "System")}</span>
      <div class="chat-bubble${hasFireEmoji ? ' fire-bubble' : ''}">${esc(msg.text)}</div>
      <span class="chat-ts">${fmtTime(msg.created_at)}</span>
    </div>`;

  return d;
}

function renderChat() {
  chatMsgs.innerHTML = "";
  const chip = document.createElement("div");
  chip.className = "chat-date-chip";
  chip.innerHTML = "<span>Today</span>";
  chatMsgs.appendChild(chip);

  chatLog.forEach(m => chatMsgs.appendChild(buildMsgEl(m)));
  scrollBottom();
}

function appendMsg(msg) {
  chatMsgs.appendChild(buildMsgEl(msg));
  scrollBottom();
}

function scrollBottom() {
  setTimeout(() => {
    chatMsgs.scrollTop = chatMsgs.scrollHeight;
  }, 30);
}

// ====================== SEND MESSAGE ======================

async function sendMsg() {
  const text = chatInput.value.trim();
  if (!text) return;

  if (Date.now() - lastMsgTime < 1000) {
    showToast("Slow down 💀", "loss");
    return;
  }
  lastMsgTime = Date.now();

  const myName = profile?.username || user?.email?.split("@")[0] || "anon";

  // Check for chat commands
  if (text.startsWith('/')) {
    handleChatCommand(text);
    chatInput.value = "";
    return;
  }

  const newMsg = {
    id: crypto.randomUUID(), // unique ID, Supabase will override
    user_id: user?.id || "local",
    username: myName,
    avatar_url: profile?.avatar_url || null,
    text: text,
    created_at: new Date(),
    type: "message",
    mine: true
  };

  // Optimistic UI update
  chatLog.push(newMsg);
  appendMsg(newMsg);
  chatInput.value = "";

  // Real Supabase insert
  try {
    await supabase
      .from('chat_messages')
      .insert({
        user_id: user?.id || "local",
        username: myName,
        text: text,
        type: 'message'
      });
  } catch (err) {
    console.error("Failed to send message:", err);
    // Optional: show error toast
  }
}

// ====================== CHAT COMMANDS ======================

function handleChatCommand(cmd) {
  const [command, ...args] = cmd.slice(1).trim().split(/\s+/);
  const argStr = args.join(" ");

  switch (command.toLowerCase()) {
    case "help":
      addSystemMessage("Available commands: /help, /clear, /me <action>");
      break;

    case "clear":
      chatMsgs.innerHTML = "";
      const chip = document.createElement("div");
      chip.className = "chat-date-chip";
      chip.innerHTML = "<span>Today</span>";
      chatMsgs.appendChild(chip);
      addSystemMessage("Chat cleared locally.");
      break;

    case "me":
      if (!argStr) {
        addSystemMessage("Usage: /me <action>");
        return;
      }
      addAnnouncement(`${profile?.username || user?.email?.split("@")[0] || "anon"} ${argStr}`);
      break;

    default:
      addSystemMessage(`Unknown command: /${command}. Type /help for available commands.`);
  }
}

// ====================== SYSTEM & ANNOUNCEMENT HELPERS ======================

  function addSystemMessage(text) {
  const msg = {
    id: crypto.randomUUID(),
    username: "System",
    text: text,
    created_at: new Date(),
    type: "system",
    mine: false
  };

  chatLog.push(msg);

  if (chatPanel.classList.contains("open")) {
    appendMsg(msg);
  }
  }

function addAnnouncement(text) {
  addSystemMessage(text);
}


// ====================== BET ANNOUNCEMENT (unchanged logic) ======================

function pushChatBetAnnounce(username, choice, question, amount) {
  const q = question.length > 42 ? question.slice(0, 42) + "…" : question;
  const msg = {
    id: crypto.randomUUID(),
    user_id: user?.id || "system",
    username: username,
    text: `${choice === "yes" ? "YES" : "NO"} ${username} bet ${choice.toUpperCase()} on "${q}"${amount ? ` · $${amount}` : ""}`,
    created_at: new Date(),
    type: "bet_announce",
    mine: false
  };
  chatLog.push(msg);
  if (chatPanel.classList.contains("open")) appendMsg(msg);
}

// ====================== REAL-TIME SUBSCRIPTION ======================

function initRealtimeChat() {
  // Load last 50 messages
  supabase
    .from('chat_messages')
    .select('*')
    .order('created_at', { ascending: true })
    .limit(50)
    .then(({ data, error }) => {
      if (error) {
        console.error("Error loading chat history:", error);
        return;
      }
      chatLog = data || [];
      renderChat();
    });

  // Subscribe to new messages
  supabase
  .channel('chat')
  .on(
    'postgres_changes',
    {
      event: 'INSERT',
      schema: 'public',
      table: 'chat_messages'
    },
    (payload) => {
      const newMsg = payload.new;

      // Deduplicate: match by ID OR by (text + user_id + within 2s window)
      // Prevents optimistic local msgs from doubling when Supabase echoes back
      const isDupe = chatLog.some(m =>
        m.id === newMsg.id ||
        (m.text === newMsg.text &&
         m.user_id === newMsg.user_id &&
         Math.abs(new Date(m.created_at) - new Date(newMsg.created_at)) < 2000)
      );

      if (!isDupe) {
        chatLog.push(newMsg);
        if (chatPanel.classList.contains("open")) {
          appendMsg(newMsg);
        }
      }
    }
  )
  .subscribe((status) => {
  console.log('Chat subscription status:', status);
});
}

// ====================== INITIALIZE ======================

document.getElementById("chatSend").addEventListener("click", sendMsg);
chatInput.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMsg();
  }
});

// Auto-init when script runs
initRealtimeChat();

  await loadProfile();
  await loadMyBets();
  await loadPredictions();
  await loadLeaderboard();
  await loadWinsTicker();

  async function loadWinsTicker() {
    const { data } = await supabase
      .from("bets")
      .select("username:profiles(username,email), amount, payout, prediction_id")
      .eq("status", "won")
      .order("updated_at", { ascending: false })
      .limit(12);

    const tickerEl = document.getElementById("tickerInner");
    if (!tickerEl) return;

    const wins = data || [];
    if (!wins.length) {
      document.getElementById("winsTicker").style.display = "none";
      return;
    }

    const items = wins.map(w => {
      const name = w.username?.username || w.username?.email?.split("@")[0] || "someone";
      const payout = w.payout ? `+$${Number(w.payout).toLocaleString()}` : "";
      return `<span class="ticker-item"><span class="t-dot">🟢</span><span class="t-name">${name}</span> just won <span class="t-amt">${payout}</span></span>`;
    }).join("");

    // Duplicate for seamless loop
    tickerEl.innerHTML = items + items;
  }

  // ====================== RESOLVE BETS + ANIMATIONS ======================

  // Subscribe to bet status changes for the current user — fires when admin resolves predictions
  function initBetResolutionListener() {
    supabase
      .channel('my-bets')
      .on('postgres_changes', {
        event: 'UPDATE',
        schema: 'public',
        table: 'bets',
        filter: `user_id=eq.${user.id}`
      }, async (payload) => {
        const updated = payload.new;
        if (!updated || updated.status === 'pending') return;

        const won = updated.status === 'won';
        const predId = updated.prediction_id;
        const payout = updated.payout ?? 0;

        // Update local state
        if (myBets[predId]) {
          myBets[predId].status = updated.status;
          myBets[predId].payout = payout;
        }

        if (won) {
          // Update balance optimistically
          if (profile) {
            profile.balance += payout;
            renderBalance(true);
          }

          // Real streak: increment on WIN, persist with last_win_date
          await handleWinStreak();

          // Reload wins ticker
          await loadWinsTicker();

          // Show win animation
          showWinBurst(payout);
          showToast(`🏆 YOU WON! +$${Number(payout).toLocaleString()}`, "win");
          addSystemMessage(`🏆 You won $${Number(payout).toLocaleString()} on a prediction!`);
        } else {
          // Loss: reset streak
          if (profile) {
            profile.streak = 0;
            renderStreak();
            supabase.from("profiles").update({ streak: 0 }).eq("id", user.id)
              .then(({ error }) => { if (error) console.warn("streak reset failed:", error.message); });
          }
          showToast("💀 Better luck next time", "loss");
        }

        renderPredictions();
      })
      .subscribe();
  }

  async function handleWinStreak() {
    if (!profile) return;

    const today = new Date().toISOString().slice(0, 10); // "YYYY-MM-DD"
    const lastWin = profile.last_win_date?.slice(0, 10);

    // Only increment streak if last win was yesterday or today (continuity)
    const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
    const shouldIncrement = !lastWin || lastWin === yesterday || lastWin === today;

    if (shouldIncrement) {
      profile.streak = (profile.streak || 0) + 1;
    } else {
      // Gap in wins — reset streak to 1
      profile.streak = 1;
    }
    profile.last_win_date = today;

    renderStreak();

    await supabase.from("profiles").update({
      streak: profile.streak,
      last_win_date: today
    }).eq("id", user.id);
  }

  // ====================== WIN BURST ANIMATION ======================

  function showWinBurst(payout) {
    // Green flash overlay
    const flash = document.createElement("div");
    flash.style.cssText = `
      position:fixed;inset:0;z-index:9000;pointer-events:none;
      background:radial-gradient(ellipse at center, rgba(87,255,168,0.18) 0%, transparent 70%);
      animation:winFlash .6s ease forwards;
    `;
    document.body.appendChild(flash);
    setTimeout(() => flash.remove(), 700);

    // Floating payout number
    const num = document.createElement("div");
    num.style.cssText = `
      position:fixed;left:50%;top:40%;transform:translateX(-50%);z-index:9001;
      font-family:'Syne',sans-serif;font-size:42px;font-weight:800;
      color:#57ffa8;text-shadow:0 0 40px rgba(87,255,168,0.6);
      pointer-events:none;animation:winNum .9s cubic-bezier(.22,1,.36,1) forwards;
    `;
    num.textContent = `+$${Number(payout).toLocaleString()}`;
    document.body.appendChild(num);
    setTimeout(() => num.remove(), 1000);

    // Confetti burst
    const colors = ['#e8ff57','#57ffa8','#57a8ff','#ff6b6b','#c57fff','#ffb857'];
    for (let i = 0; i < 32; i++) {
      const c = document.createElement("div");
      const size = 6 + Math.random() * 8;
      const angle = Math.random() * 360;
      const dist = 120 + Math.random() * 180;
      const x = Math.cos(angle * Math.PI / 180) * dist;
      const y = Math.sin(angle * Math.PI / 180) * dist - 80;
      c.style.cssText = `
        position:fixed;left:50%;top:50%;width:${size}px;height:${size}px;
        background:${colors[Math.floor(Math.random() * colors.length)]};
        border-radius:${Math.random() > .5 ? '50%' : '2px'};
        pointer-events:none;z-index:9001;
        animation:confetti .9s cubic-bezier(.22,1,.36,1) forwards;
        --tx:${x}px;--ty:${y}px;opacity:1;
      `;
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 1000);
    }
  }

  // ====================== DAILY REFRESH LOOP ======================

  function initDailyRefresh() {
    // Calculate ms until next midnight UTC
    const now = new Date();
    const tomorrow = new Date(Date.UTC(
      now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate() + 1
    ));
    const msUntilMidnight = tomorrow - now;

    // Fire at midnight
    setTimeout(async () => {
      showToast("🌅 New day, new predictions. Let's go.", "info");
      addSystemMessage("🌅 New predictions just dropped. Today's slate is live.");

      // Reset local myBets so voted cards unlock for new predictions
      myBets = {};

      await loadPredictions();
      await loadLeaderboard();
      await loadWinsTicker();

      // Reset streak if user hasn't won since yesterday
      if (profile?.last_win_date) {
        const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
        const lastWin = profile.last_win_date.slice(0, 10);
        if (lastWin < yesterday) {
          profile.streak = 0;
          renderStreak();
          supabase.from("profiles").update({ streak: 0 }).eq("id", user.id)
            .catch(() => {});
        }
      }

      // Re-schedule for next midnight
      initDailyRefresh();
    }, msUntilMidnight);
  }

  initBetResolutionListener();
  initDailyRefresh();
