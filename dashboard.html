<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Prophetly — Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>

<style>
*{box-sizing:border-box;margin:0;padding:0}

:root{
--bg:#080b12;
--surface:#0e1420;
--border:rgba(255,255,255,0.06);
--accent:#e8ff57;
--green:#57ffa8;
--red:#ff6b6b;
--text:#f0f2f8;
--muted:#4a5568;
}

body{
background:var(--bg);
color:var(--text);
font-family:'Outfit',sans-serif;
padding-bottom:40px;
}

main{max-width:680px;margin:auto;padding:24px}

.icon-sm{width:12px;height:12px;vertical-align:middle}
.icon-md{width:16px;height:16px}

.stat-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
}

.stat-tile{
background:var(--surface);
border:1px solid var(--border);
border-radius:12px;
padding:16px;
}

.value{font-family:'Syne';font-size:22px;font-weight:800}

.streak-bar{display:flex;gap:4px;flex-wrap:wrap;margin-top:10px}

.streak-day{
width:26px;height:26px;
border-radius:6px;
display:flex;
align-items:center;
justify-content:center;
font-size:10px;
background:#111827;
}

.history-row{
background:var(--surface);
border:1px solid var(--border);
border-radius:10px;
padding:12px;
display:flex;
gap:10px;
margin-bottom:8px;
align-items:center;
}

</style>
</head>

<body>

<main>

<div class="stat-grid">
<div class="stat-tile">
<div>Balance</div>
<div class="value" id="dashBalance">—</div>
</div>

<div class="stat-tile">
<div>Win Rate</div>
<div class="value" id="dashWR">—</div>
</div>

<div class="stat-tile">
<div>Rakeback</div>
<div class="value" id="dashRake">—</div>
</div>

<div class="stat-tile">
<div>Bonuses</div>
<div class="value" id="dashBonus">—</div>
</div>
</div>

<h3 style="margin-top:20px">30 Day Activity</h3>
<div class="streak-bar" id="streakBar"></div>

<h3 style="margin-top:20px">Recent Bets</h3>
<div id="histList"></div>

</main>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

const supabase = createClient(
"https://yjeedgcveawterfpvnuc.supabase.co",
"sb_publishable_Z5FbPNQg7OV9yPK8RZDSpg_7FSCM5_n"
);

const { data:{ session } } = await supabase.auth.getSession();
if(!session) location.href="login.html";

const user = session.user;

const { data: profile } = await supabase
.from("profiles")
.select("*")
.eq("id",user.id)
.single();

const p = profile || {};

document.getElementById("dashBalance").textContent = "$"+(p.balance||0);
document.getElementById("dashWR").textContent =
p.total_picks ? Math.round(p.correct_picks/p.total_picks*100)+"%" : "—";

document.getElementById("dashRake").textContent = "$0";
document.getElementById("dashBonus").textContent = "$0";

const { data: bets } = await supabase
.from("bets")
.select("*")
.eq("user_id",user.id)
.order("created_at",{ascending:false});

const bar = document.getElementById("streakBar");

bar.innerHTML = Array.from({length:30},(_,i)=>{
const bet = bets?.[i];
return `<div class="streak-day">${
bet ? `<img src="/assets/icons/flame.svg" class="icon-sm">` : "-"
}</div>`;
}).join("");

const hist = document.getElementById("histList");

hist.innerHTML = bets?.map(b=>`
<div class="history-row">
<img src="/assets/icons/hourglass.svg" class="icon-md">
<div>${b.prediction_id}</div>
<div style="margin-left:auto">$${b.amount}</div>
</div>
`).join("") || "No bets";

</script>

</body>
</html>
