<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Prophetly — Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>

<style>
*{box-sizing:border-box;margin:0;padding:0}

:root{
--bg:#080b12;
--surface:#0e1420;
--border:rgba(255,255,255,0.06);
--accent:#e8ff57;
--green:#57ffa8;
--red:#ff6b6b;
--text:#f0f2f8;
--muted:#4a5568;
}

body{
background:var(--bg);
color:var(--text);
font-family:'Outfit',sans-serif;
padding-bottom:40px;
}

main{max-width:680px;margin:auto;padding:24px}

.icon-sm{width:12px;height:12px;vertical-align:middle}
.icon-md{width:16px;height:16px}

.stat-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
}

.stat-tile{
background:var(--surface);
border:1px solid var(--border);
border-radius:12px;
padding:16px;
}

.value{font-family:'Syne';font-size:22px;font-weight:800}

.streak-bar{display:flex;gap:4px;flex-wrap:wrap;margin-top:10px}

.streak-day{
width:26px;height:26px;
border-radius:6px;
display:flex;
align-items:center;
justify-content:center;
font-size:10px;
background:#111827;
}

.history-row{
background:var(--surface);
border:1px solid var(--border);
border-radius:10px;
padding:12px;
display:flex;
gap:10px;
margin-bottom:8px;
align-items:center;
}

</style>
</head>

<body>

<main>

<div class="stat-grid">
<div class="stat-tile">
<div>Balance</div>
<div class="value" id="dashBalance">—</div>
</div>

<div class="stat-tile">
<div>Win Rate</div>
<div class="value" id="dashWR">—</div>
</div>

<div class="stat-tile">
<div>Rakeback</div>
<div class="value" id="dashRake">—</div>
</div>

<div class="stat-tile">
<div>Bonuses</div>
<div class="value" id="dashBonus">—</div>
</div>
</div>

<h3 style="margin-top:20px">30 Day Activity</h3>
<div class="streak-bar" id="streakBar"></div>

<h3 style="margin-top:20px">Recent Bets</h3>
<div id="histList"></div>

</main>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

const supabase = createClient(
  "https://yjeedgcveawterfpvnuc.supabase.co",
  "YOUR_KEY",
  { auth: { persistSession: true, autoRefreshToken: true } }
);

const { data: { session } } = await supabase.auth.getSession();
if (!session) window.location.replace("login.html");
const user = session.user;

// PROFILE
const { data: profile } = await supabase.from("profiles").select("*").eq("id", user.id).single();
const p = profile || {};

const initial = (user.email || "?")[0].toUpperCase();
const name = user.email?.split("@")[0] || "Prophet";
const joined = new Date(user.created_at).toLocaleDateString("en-US", { month: "long", year: "numeric" });

const wr = p.total_picks > 0
  ? Math.round((p.correct_picks / p.total_picks) * 100) + "%"
  : "—";

// BASIC UI
dashAvatar.textContent = initial;
dashName.textContent = name;
dashEmail.textContent = user.email;
dashJoined.textContent = "Joined " + joined;

dashBalance.textContent = "$" + Number(p.balance || 0).toLocaleString();
dashWR.textContent = wr;
dashPicks.textContent = p.total_picks || 0;

// 🔥 STREAK ICON (SVG)
dashStreak.innerHTML = `
  ${p.streak || 0}
  <img src="/assets/icons/flame.svg" width="14" style="margin-left:4px;vertical-align:middle;">
`;

// SETTINGS
settingsEmail.textContent = user.email;
settingsJoined.textContent = joined;

// 🧠 RAKEBACK + BONUS (simple system)
const rakeback = Math.floor((p.total_lost || 0) * 0.03); // 3%
const dailyBonus = 50;

// append to balance tile (no UI change, just subtext tweak)
document.querySelectorAll(".stat-tile")[0].querySelector(".sub").innerHTML =
  `+${rakeback} rakeback · +${dailyBonus} daily`;

// 🧠 REAL 30-DAY ACTIVITY
const { data: bets } = await supabase
  .from("bets")
  .select("created_at, status")
  .eq("user_id", user.id);

const bar = document.getElementById("streakBar");
const today = new Date();

function sameDay(a, b) {
  return a.toDateString() === b.toDateString();
}

bar.innerHTML = Array.from({ length: 30 }, (_, i) => {
  const d = new Date(today);
  d.setDate(d.getDate() - (29 - i));

  const dayBets = bets?.filter(b => sameDay(new Date(b.created_at), d)) || [];

  let cls = "skip";
  let icon = d.getDate();

  if (dayBets.length > 0) {
    const win = dayBets.some(b => b.status === "won");
    const loss = dayBets.some(b => b.status === "lost");

    if (win) {
      cls = "win";
      icon = `<img src="/assets/icons/circle-check.svg" width="12">`;
    } else if (loss) {
      cls = "loss";
      icon = `<img src="/assets/icons/x.svg" width="12">`;
    }
  }

  return `<div class="streak-day ${cls}${i === 29 ? " today" : ""}">${icon}</div>`;
}).join("");

// 🧠 HISTORY (clean icons)
const histList = document.getElementById("histList");

const { data: betsList } = await supabase
  .from("bets")
  .select("*")
  .eq("user_id", user.id)
  .order("created_at", { ascending: false });

if (!betsList || betsList.length === 0) {
  histList.innerHTML = `<div class="empty">No picks yet</div>`;
} else {
  histCount.textContent = betsList.length + " picks";

  histList.innerHTML = betsList.map(bet => {
    const status = bet.status || "pending";

    let icon = `<img src="/assets/icons/hourglass.svg" width="14">`;
    let cls = "open";

    if (status === "won") {
      icon = `<img src="/assets/icons/circle-check.svg" width="14">`;
      cls = "win";
    } else if (status === "lost") {
      icon = `<img src="/assets/icons/x.svg" width="14">`;
      cls = "loss";
    }

    return `
    <div class="history-row">
      <div class="history-outcome ${cls}">${icon}</div>
      <div class="history-q">
        ${bet.prediction_id}
        <div class="history-sub">
          ${bet.choice?.toUpperCase()} · ${status}
        </div>
      </div>
      <div class="history-amt">
        <div class="amt-val neu">$${bet.amount}</div>
        <div class="amt-sub">wagered</div>
      </div>
    </div>`;
  }).join("");
}

// LOGOUT
logoutBtn.onclick = async () => {
  await supabase.auth.signOut();
  window.location.replace("login.html");
};
</script>

</body>
</html>
