<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Prophetly</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#080b12; --surface:#0e1420; --raised:#131a28;
      --border:rgba(255,255,255,0.06); --accent:#e8ff57;
      --green:#57ffa8; --red:#ff6b6b; --blue:#57a8ff; --purple:#c57fff;
      --text:#f0f2f8; --muted:#4a5568; --sub:#8892a4;
    }
    html{height:100%}
    body{min-height:100%;background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;padding-bottom:100px}
    body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");opacity:.5}
    .blob{position:fixed;border-radius:50%;filter:blur(100px);pointer-events:none;z-index:0}
    .blob-1{width:500px;height:500px;background:rgba(232,255,87,0.04);top:-200px;right:-100px}
    .blob-2{width:400px;height:400px;background:rgba(87,160,255,0.04);bottom:-100px;left:-80px}
    @keyframes fadeDown{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
    @keyframes popIn{from{opacity:0;transform:scale(0.93)}to{opacity:1;transform:scale(1)}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
    @keyframes shimmer{from{background-position:200% 0}to{background-position:-200% 0}}
    @keyframes slideIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

    /* NAV.  no */
    nav{position:sticky;top:0;z-index:200;background:rgba(8,11,18,0.9);backdrop-filter:blur(20px);
      border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;
      justify-content:space-between;height:60px;animation:fadeDown .4s ease both}
    .logo-wrap{display:flex;align-items:center;gap:10px}
    /* PLACEHOLDER: swap .logo-icon-placeholder for <img src="assets/logo.svg" width="30"> */
    .logo-icon-placeholder{width:30px;height:30px;border-radius:8px;
      background:linear-gradient(135deg,var(--accent),var(--green));
      display:grid;place-items:center;font-size:14px;flex-shrink:0}
    .logo{font-family:'Syne',sans-serif;font-weight:800;font-size:18px}
    .logo span{color:var(--accent)}
    .nav-right{display:flex;align-items:center;gap:10px}
    .balance-pill{background:var(--raised);border:1px solid var(--border);border-radius:100px;
      padding:6px 14px;font-size:14px;font-weight:600;display:flex;align-items:center;gap:6px;
      transition:border-color .35s,box-shadow .35s}
    .balance-pill.flash{border-color:rgba(232,255,87,.6);box-shadow:0 0 12px rgba(232,255,87,.15)}
    .balance-pill .amt{color:var(--accent);font-family:'Syne',sans-serif}
    .chat-toggle-btn{width:36px;height:36px;border-radius:10px;background:var(--raised);
      border:1px solid var(--border);display:grid;place-items:center;cursor:pointer;
      font-size:16px;transition:all .2s;position:relative}
    .chat-toggle-btn:hover{border-color:rgba(255,255,255,.2)}
    .chat-dot{position:absolute;top:5px;right:5px;width:7px;height:7px;border-radius:50%;
      background:var(--green);border:1.5px solid var(--bg)}
    /* PLACEHOLDER: swap .avatar span for <img src="[user.avatar_url]"> */
    .avatar{width:34px;height:34px;border-radius:50%;
      background:linear-gradient(135deg,var(--accent),#57ffa8);
      display:grid;place-items:center;font-size:13px;font-weight:700;color:#080b12;
      cursor:pointer;flex-shrink:0;position:relative}
    .avatar-menu{position:absolute;top:calc(100% + 10px);right:0;background:var(--surface);
      border:1px solid var(--border);border-radius:12px;padding:6px;min-width:165px;z-index:300;
      box-shadow:0 16px 40px rgba(0,0,0,.55);display:none}
    .avatar-menu.open{display:block;animation:popIn .18s ease}
    .avatar-menu a,.avatar-menu button{display:flex;align-items:center;gap:8px;width:100%;
      text-align:left;padding:9px 12px;border-radius:8px;font-size:13px;font-weight:500;
      color:var(--sub);background:none;border:none;cursor:pointer;text-decoration:none;
      transition:background .15s,color .15s;font-family:'Outfit',sans-serif}
    .avatar-menu a:hover,.avatar-menu button:hover{background:var(--raised);color:var(--text)}
    .avatar-menu .danger{color:var(--red)}
    .avatar-menu .danger:hover{background:rgba(255,107,107,.08)}

    /* MAIN */
    main{max-width:700px;margin:0 auto;padding:28px 18px 0;position:relative;z-index:1}
    .hero{margin-bottom:24px;animation:fadeUp .45s .05s ease both}
    .hero-date{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
    .hero-title{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;line-height:1.15}
    .hero-title em{color:var(--accent);font-style:normal}

    /* CATEGORIES */
    /* PLACEHOLDER: swap emoji inside .cat-btn for <img src="assets/icons/[cat].svg" class="cat-icon" width="14"> */
    .cat-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;
      margin-bottom:22px;animation:fadeUp .45s .1s ease both}
    .cat-row::-webkit-scrollbar{display:none}
    .cat-btn{flex-shrink:0;padding:7px 15px;background:var(--surface);border:1px solid var(--border);
      border-radius:100px;color:var(--sub);font-family:'Outfit',sans-serif;font-size:13px;
      font-weight:500;cursor:pointer;transition:all .2s;white-space:nowrap;display:flex;align-items:center;gap:5px}
    .cat-btn:hover{border-color:rgba(255,255,255,.15);color:var(--text)}
    .cat-btn.active{background:var(--accent);border-color:var(--accent);color:#080b12;font-weight:600}
    .section-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;
      letter-spacing:1px;margin-bottom:12px}

    /* PREDICTION CARDS */
    .predictions{display:flex;flex-direction:column;gap:14px;margin-bottom:32px}
    .pred-card{background:var(--surface);border:1px solid var(--border);border-radius:18px;
      overflow:hidden;transition:border-color .2s,box-shadow .2s;animation:fadeUp .4s ease both}
    .pred-card:hover{border-color:rgba(255,255,255,.11);box-shadow:0 8px 32px rgba(0,0,0,.3)}
    .pred-card.is-voted{border-color:rgba(255,255,255,.07)}
    .pred-card.is-submitting{pointer-events:none;opacity:.8}
    .pred-inner{padding:20px}
    .pred-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
    .pred-cat{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;
      padding:3px 9px;border-radius:100px;display:flex;align-items:center;gap:4px}
    .cat-weather{background:rgba(87,168,255,.12);color:var(--blue);border:1px solid rgba(87,168,255,.2)}
    .cat-sports{background:rgba(87,255,168,.1);color:var(--green);border:1px solid rgba(87,255,168,.2)}
    .cat-dumb{background:rgba(232,255,87,.1);color:var(--accent);border:1px solid rgba(232,255,87,.2)}
    .cat-finance{background:rgba(255,107,107,.1);color:var(--red);border:1px solid rgba(255,107,107,.2)}
    .cat-tech{background:rgba(180,87,255,.1);color:var(--purple);border:1px solid rgba(180,87,255,.2)}
    .pred-odds{font-size:12px;color:var(--muted)}
    .pred-odds strong{color:var(--text);font-family:'Syne',sans-serif}
    .pred-question{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;line-height:1.3;margin-bottom:6px}
    .pred-desc{font-size:13px;color:var(--sub);margin-bottom:16px;line-height:1.5}
    .pred-stats{display:flex;gap:14px;margin-bottom:16px;flex-wrap:wrap}
    .pred-stat{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:4px}
    .pred-stat strong{color:var(--sub);font-weight:500}

    /* YES/NO buttons */
    .vote-row{display:flex;gap:8px;margin-bottom:14px}
    .vote-btn{flex:1;padding:10px;border-radius:10px;border:1px solid var(--border);
      background:var(--raised);color:var(--sub);font-family:'Outfit',sans-serif;
      font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;text-align:center}
    .vote-btn:hover:not(:disabled){transform:translateY(-1px)}
    .vote-btn.yes:hover:not(:disabled){background:rgba(87,255,168,.12);border-color:rgba(87,255,168,.4);color:var(--green)}
    .vote-btn.no:hover:not(:disabled){background:rgba(255,107,107,.1);border-color:rgba(255,107,107,.4);color:var(--red)}
    .vote-btn.selected-yes{background:rgba(87,255,168,.15);border-color:rgba(87,255,168,.6);color:var(--green);font-weight:700}
    .vote-btn.selected-no{background:rgba(255,107,107,.12);border-color:rgba(255,107,107,.6);color:var(--red);font-weight:700}
    .vote-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}

    /* Wager section */
    .wager-section{background:var(--raised);border-radius:12px;padding:14px;margin-bottom:12px;
      animation:slideIn .22s ease both}
    .wager-section.hidden{display:none}
    .wager-top{display:flex;align-items:center;gap:8px;margin-bottom:10px}
    .wager-label{font-size:12px;color:var(--muted);font-weight:500;flex-shrink:0}
    .wager-input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:8px;
      padding:8px 12px;color:var(--text);font-family:'Outfit',sans-serif;font-size:14px;
      font-weight:600;outline:none;transition:border-color .2s}
    .wager-input::placeholder{color:var(--muted);font-weight:400}
    .wager-input:focus{border-color:rgba(232,255,87,.35)}
    .wager-quick{display:flex;gap:5px}
    .wager-quick button{flex:1;padding:6px 0;background:var(--surface);border:1px solid var(--border);
      border-radius:7px;color:var(--sub);font-size:11px;font-weight:600;cursor:pointer;
      transition:all .15s;font-family:'Outfit',sans-serif}
    .wager-quick button:hover{background:rgba(232,255,87,.08);border-color:rgba(232,255,87,.3);color:var(--accent)}
    .payout-preview{display:flex;align-items:center;justify-content:space-between;
      padding-top:10px;margin-top:10px;border-top:1px solid var(--border);font-size:12px;color:var(--muted)}
    .payout-val{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--green)}

    /* BET button */
    .bet-btn{width:100%;padding:13px;border-radius:11px;background:var(--accent);border:none;
      color:#080b12;font-family:'Syne',sans-serif;font-size:14px;font-weight:800;cursor:pointer;
      transition:opacity .2s,transform .15s,box-shadow .2s;box-shadow:0 4px 24px rgba(232,255,87,.2);
      display:flex;align-items:center;justify-content:center;gap:8px}
    .bet-btn:hover:not(:disabled){opacity:.9;transform:translateY(-1px);box-shadow:0 8px 32px rgba(232,255,87,.3)}
    .bet-btn:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}
    .bet-btn.hidden{display:none}
    .btn-spinner{width:14px;height:14px;border:2px solid rgba(8,11,18,.3);border-top-color:#080b12;
      border-radius:50%;animation:spin .7s linear infinite;display:none}
    .bet-btn.loading .btn-spinner{display:inline-block}
    .bet-btn.loading .btn-text{display:none}

    /* Voted banner */
    .voted-banner{background:var(--raised);border-top:1px solid var(--border);padding:14px 20px;
      display:flex;align-items:center;justify-content:space-between;gap:12px}
    .voted-badge{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600}
    .voted-badge.yes .vb-label{color:var(--green)}
    .voted-badge.no .vb-label{color:var(--red)}
    .voted-amount{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--accent)}
    .voted-status{font-size:11px;color:var(--muted);margin-top:3px}

    /* LEADERBOARD */
    .lb-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;
      overflow:hidden;margin-bottom:32px;animation:fadeUp .45s .25s ease both}
    .lb-header{padding:16px 20px;border-bottom:1px solid var(--border);
      display:flex;align-items:center;justify-content:space-between}
    .lb-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:700}
    .lb-sub{font-size:12px;color:var(--muted)}
    .lb-row{display:flex;align-items:center;gap:14px;padding:13px 20px;
      border-bottom:1px solid rgba(255,255,255,.03);transition:background .15s}
    .lb-row:last-child{border-bottom:none}
    .lb-row:hover{background:var(--raised)}
    .lb-row.me{background:rgba(232,255,87,.04)}
    .lb-rank{width:24px;text-align:center;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--muted);flex-shrink:0}
    .lb-rank.gold{color:#ffd700}.lb-rank.silver{color:#c0c0c0}.lb-rank.bronze{color:#cd7f32}
    /* PLACEHOLDER: swap .lb-avatar for <img src="[avatar_url]"> */
    .lb-avatar{width:32px;height:32px;border-radius:50%;flex-shrink:0;display:grid;
      place-items:center;font-size:12px;font-weight:700;color:#080b12}
    .lb-name{flex:1;font-size:14px;font-weight:500}
    .lb-name .you{font-size:11px;color:var(--accent);margin-left:6px}
    .lb-stats{text-align:right}
    .lb-bal{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--accent)}
    .lb-wr{font-size:11px;color:var(--muted)}

    /* CHAT PANEL
     * REAL-TIME UPGRADE PATH:
     * 1. Table: chat_messages(id uuid, user_id uuid, username text, text text, created_at timestamptz, type text)
     * 2. Load: supabase.from('chat_messages').select('*').order('created_at').limit(50)
     * 3. Subscribe: supabase.channel('chat').on('postgres_changes',{event:'INSERT',...}, cb).subscribe()
     * 4. Send: supabase.from('chat_messages').insert({user_id, username, text, type:'message'})
     * 5. Delete pushFakeReply() — real replies auto-arrive via subscription
     */
    .chat-panel{position:fixed;right:0;bottom:0;top:60px;width:320px;z-index:150;
      background:var(--surface);border-left:1px solid var(--border);
      display:flex;flex-direction:column;
      transform:translateX(100%);transition:transform .3s cubic-bezier(.22,1,.36,1)}
    .chat-panel.open{transform:translateX(0)}
    .chat-header{padding:16px 18px;border-bottom:1px solid var(--border);
      display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
    .chat-header-left{display:flex;align-items:center;gap:10px}
    .chat-live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
    .chat-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700}
    .chat-online{font-size:11px;color:var(--muted)}
    .chat-close{background:none;border:none;color:var(--muted);cursor:pointer;
      font-size:20px;padding:2px 6px;line-height:1;transition:color .15s}
    .chat-close:hover{color:var(--text)}
    .chat-messages{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;
      gap:10px;scrollbar-width:thin;scrollbar-color:var(--raised) transparent}
    .chat-messages::-webkit-scrollbar{width:4px}
    .chat-messages::-webkit-scrollbar-thumb{background:var(--raised);border-radius:4px}
    .chat-msg{display:flex;gap:9px;animation:fadeUp .2s ease both}
    .chat-msg.mine{flex-direction:row-reverse}
    /* PLACEHOLDER: swap .chat-avatar for <img src="[avatar_url]"> */
    .chat-avatar{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:grid;
      place-items:center;font-size:11px;font-weight:700;color:#080b12}
    .chat-bubble-wrap{display:flex;flex-direction:column;gap:3px;max-width:76%}
    .chat-msg.mine .chat-bubble-wrap{align-items:flex-end}
    .chat-username{font-size:10px;color:var(--muted);font-weight:500;padding:0 4px}
    .chat-bubble{background:var(--raised);border-radius:12px 12px 12px 3px;padding:9px 12px;
      font-size:13px;line-height:1.45;color:var(--text);word-break:break-word}
    .chat-msg.mine .chat-bubble{background:rgba(232,255,87,.1);border-radius:12px 12px 3px 12px}
    .chat-msg.bet-announce .chat-bubble{background:rgba(87,255,168,.07);
      border:1px solid rgba(87,255,168,.15);font-size:12px;color:var(--sub)}
    .chat-ts{font-size:10px;color:var(--muted);padding:0 4px}
    .chat-date-chip{text-align:center;font-size:10px;color:var(--muted);position:relative;margin:4px 0}
    .chat-date-chip span{background:var(--surface);padding:0 10px;position:relative;z-index:1}
    .chat-date-chip::before{content:'';position:absolute;left:0;right:0;top:50%;
      border-top:1px solid var(--border);z-index:0}
    .chat-input-wrap{padding:12px 14px;border-top:1px solid var(--border);
      display:flex;gap:8px;flex-shrink:0}
    .chat-input{flex:1;background:var(--raised);border:1px solid var(--border);border-radius:10px;
      padding:9px 13px;color:var(--text);font-family:'Outfit',sans-serif;font-size:13px;
      outline:none;transition:border-color .2s}
    .chat-input::placeholder{color:var(--muted)}
    .chat-input:focus{border-color:rgba(232,255,87,.3)}
    /* PLACEHOLDER: swap .chat-send inner emoji for <img src="assets/icons/send.svg"> */
    .chat-send{width:36px;height:36px;border-radius:10px;background:var(--accent);border:none;
      color:#080b12;font-size:15px;cursor:pointer;display:grid;place-items:center;
      flex-shrink:0;transition:opacity .2s,transform .15s}
    .chat-send:hover{opacity:.88;transform:scale(1.05)}

    /* TOAST */
    #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);
      background:var(--surface);border:1px solid var(--border);border-radius:10px;
      padding:11px 20px;font-size:13px;font-weight:500;color:var(--text);
      box-shadow:0 8px 32px rgba(0,0,0,.5);z-index:9999;
      transition:transform .3s cubic-bezier(.22,1,.36,1);white-space:nowrap;pointer-events:none}
    #toast.show{transform:translateX(-50%) translateY(0)}
    #toast.win{color:var(--green);border-color:rgba(87,255,168,.3)}
    #toast.loss{color:var(--red);border-color:rgba(255,107,107,.3)}
    #toast.info{color:var(--accent);border-color:rgba(232,255,87,.3)}

    /* ── SVG icon system ── */
    .icon{display:inline-block;vertical-align:middle;flex-shrink:0}
    /* nav wallet */
    .nav-balance .icon{width:13px;height:13px;filter:invert(1) brightness(.6);margin-right:2px;position:relative;top:-1px}
    /* logo zap */
    .logo-icon-placeholder .icon{width:18px;height:18px;filter:brightness(0) invert(0)}
    /* avatar menu icons */
    .avatar-menu .menu-icon{width:14px;height:14px;filter:invert(1) brightness(.55);flex-shrink:0}
    /* category button icons */
    .cat-icon{width:13px;height:13px;filter:invert(1) brightness(.55);flex-shrink:0;transition:filter .2s}
    .cat-btn.active .cat-icon{filter:brightness(0) invert(0)}
    .cat-btn:hover:not(.active) .cat-icon{filter:invert(1) brightness(.75)}
    /* pred-cat badge icons */
    .badge-icon{width:11px;height:11px;flex-shrink:0}
    .cat-weather .badge-icon{filter:invert(62%) sepia(80%) saturate(500%) hue-rotate(190deg)}
    .cat-sports  .badge-icon{filter:invert(85%) sepia(40%) saturate(400%) hue-rotate(100deg)}
    .cat-dumb    .badge-icon{filter:invert(95%) sepia(60%) saturate(600%) hue-rotate(10deg)}
    .cat-finance .badge-icon{filter:invert(55%) sepia(80%) saturate(600%) hue-rotate(320deg)}
    .cat-tech    .badge-icon{filter:invert(65%) sepia(60%) saturate(500%) hue-rotate(240deg)}
    /* pred-stat icons */
    .stat-icon{width:12px;height:12px;filter:invert(1) brightness(.45);flex-shrink:0;position:relative;top:1px}
    /* vote button icons */
    .vote-icon{width:14px;height:14px;flex-shrink:0}
    .vote-btn.yes .vote-icon,.vote-btn.selected-yes .vote-icon{filter:invert(85%) sepia(40%) saturate(400%) hue-rotate(100deg)}
    .vote-btn.no  .vote-icon,.vote-btn.selected-no  .vote-icon{filter:invert(55%) sepia(80%) saturate(600%) hue-rotate(320deg)}
    .vote-btn:not(.selected-yes):not(.selected-no) .vote-icon{filter:invert(1) brightness(.45)}
    /* voted-banner icons */
    .vb-icon{width:14px;height:14px;flex-shrink:0}
    .voted-badge.yes .vb-icon{filter:invert(85%) sepia(40%) saturate(400%) hue-rotate(100deg)}
    .voted-badge.no  .vb-icon{filter:invert(55%) sepia(80%) saturate(600%) hue-rotate(320deg)}
    /* status icons */
    .status-icon{width:12px;height:12px;flex-shrink:0;position:relative;top:1px}
    .status-won  .status-icon{filter:invert(85%) sepia(40%) saturate(400%) hue-rotate(100deg)}

/* Place bet (secure) */
async function placeBet(predId) {
  const choice = pendingChoice[predId];
  const amount = parseInt(document.getElementById(`wager-${predId}`)?.value) || 0;

  if (!choice) {
    showToast("Pick YES or NO first 💀", "loss");
    return;
  }

  if (!amount || amount <= 0) {
    showToast("Enter a valid amount", "loss");
    return;
  }

  const btn = document.getElementById(`bet-btn-${predId}`);
  const card = document.getElementById(`card-${predId}`);

  btn?.classList.add("loading");
  btn.disabled = true;
  card?.classList.add("is-submitting");

  const { error } = await supabase.rpc("place_bet_secure", {
    p_prediction_id: predId,
    p_choice: choice,
    p_amount: amount
  });

  if (error) {
    console.error("bet error:", error);

    showToast(
      error.message?.includes("balance")
        ? "Not enough balance"
        : "Bet failed",
      "loss"
    );

    btn?.classList.remove("loading");
    btn.disabled = false;
    card?.classList.remove("is-submitting");
    return;
  }

  // success
  myBets[predId] = { choice, amount, status: "pending", payout: null };
  delete pendingChoice[predId];

  await loadProfile();
  await loadPredictions();

  showToast(
    choice === "yes"
      ? `✅ YES locked! $${amount}`
      : `❌ NO locked! $${amount}`,
    "win"
  );

  pushChatBetAnnounce(
    profile?.username || user.email?.split("@")[0] || "anon",
    choice,
    PREDICTIONS.find(p => p.id === predId)?.question || "a prediction",
    amount
  );
}

}

function buildMsgEl(msg) {
  const mine = msg.mine || (msg.user_id === user?.id);
  const colors = ["#e8ff57","#57ffa8","#57a8ff","#ff6b6b","#c57fff","#ffb857"];
  const ci = (msg.username || "?").charCodeAt(0) % colors.length;

  const d = document.createElement("div");
d.className = `chat-msg${mine ? " mine" : ""}${msg.type === "bet_announce" ? " bet-announce" : ""}`;
  d.id = `msg-${msg.id}`;
  d.innerHTML = `
    <div class="chat-avatar" style="background:${colors[ci]};overflow:hidden;padding:0">
      ${msg.avatar_url
        ? `<img src="${msg.avatar_url}" style="width:28px;height:28px;object-fit:cover;border-radius:50%">`
        : `${(msg.username || "?")[0].toUpperCase()}`}
    </div>
    <div class="chat-bubble-wrap">
      <span class="chat-username">${esc(msg.username || "System")}</span>
      <div class="chat-bubble">${esc(msg.text)}</div>
      <span class="chat-ts">${fmtTime(msg.created_at)}</span>
    </div>`;

  return d;
}

function renderChat() {
  chatMsgs.innerHTML = "";
  const chip = document.createElement("div");
  chip.className = "chat-date-chip";
  chip.innerHTML = "<span>Today</span>";
  chatMsgs.appendChild(chip);

  chatLog.forEach(m => chatMsgs.appendChild(buildMsgEl(m)));
  scrollBottom();
}

function appendMsg(msg) {
  chatMsgs.appendChild(buildMsgEl(msg));
  scrollBottom();
}

function scrollBottom() {
  setTimeout(() => {
    chatMsgs.scrollTop = chatMsgs.scrollHeight;
  }, 30);
}

// ====================== SEND MESSAGE ======================

async function sendMsg() {
  const text = chatInput.value.trim();
  if (!text) return;

  const myName = profile?.username || user?.email?.split("@")[0] || "anon";

  // Check for chat commands
  if (text.startsWith('/')) {
    handleChatCommand(text);
    chatInput.value = "";
    return;
  }

  const newMsg = {
    id: Date.now(), // temporary ID, Supabase will override
    user_id: user?.id || "local",
    username: myName,
    avatar_url: profile?.avatar_url || null,
    text: text,
    created_at: new Date(),
    type: "message",
    mine: true
  };

  // Optimistic UI update
  chatLog.push(newMsg);
  appendMsg(newMsg);
  chatInput.value = "";

  // Real Supabase insert
  try {
    await supabase
      .from('chat_messages')
      .insert({
        user_id: user?.id || "local",
        username: myName,
        text: text,
        type: 'message'
      });
  } catch (err) {
    console.error("Failed to send message:", err);
    // Optional: show error toast
  }
}

// ====================== CHAT COMMANDS ======================

function handleChatCommand(cmd) {
  const [command, ...args] = cmd.slice(1).trim().split(/\s+/);
  const argStr = args.join(" ");

  switch (command.toLowerCase()) {
    case "help":
      addSystemMessage("Available commands: /help, /clear, /me <action>");
      break;

    case "clear":
      chatMsgs.innerHTML = "";
      const chip = document.createElement("div");
      chip.className = "chat-date-chip";
      chip.innerHTML = "<span>Today</span>";
      chatMsgs.appendChild(chip);
      addSystemMessage("Chat cleared locally.");
      break;

    case "me":
      if (!argStr) {
        addSystemMessage("Usage: /me <action>");
        return;
      }
      addAnnouncement(`${profile?.username || user?.email?.split("@")[0] || "anon"} ${argStr}`);
      break;

    default:
      addSystemMessage(`Unknown command: /${command}. Type /help for available commands.`);
  }
}

// ====================== SYSTEM & ANNOUNCEMENT HELPERS ======================

  function addSystemMessage(text) {
  const msg = {
    id: Date.now(),
    username: "System",
    text: text,
    created_at: new Date(),
    type: "system",
    mine: false
  };

  chatLog.push(msg);

  if (chatPanel.classList.contains("open")) {
    appendMsg(msg);
  }
  }


// ====================== BET ANNOUNCEMENT (unchanged logic) ======================

function pushChatBetAnnounce(username, choice, question, amount) {
  const q = question.length > 42 ? question.slice(0, 42) + "…" : question;
  const msg = {
    id: Date.now(),
    user_id: user?.id || "system",
    username: username,
    text: `${choice === "yes" ? "YES" : "NO"} ${username} bet ${choice.toUpperCase()} on "${q}"${amount ? ` · $${amount}` : ""}`,
    created_at: new Date(),
    type: "bet_announce",
    mine: false
  };
  chatLog.push(msg);
  if (chatPanel.classList.contains("open")) appendMsg(msg);
}

// ====================== REAL-TIME SUBSCRIPTION ======================

function initRealtimeChat() {
  // Load last 50 messages
  supabase
    .from('chat_messages')
    .select('*')
    .order('created_at', { ascending: true })
    .limit(50)
    .then(({ data, error }) => {
      if (error) {
        console.error("Error loading chat history:", error);
        return;
      }
      chatLog = data || [];
      renderChat();
    });

  // Subscribe to new messages
  supabase
  .channel('chat')
  .on(
    'postgres_changes',
    {
      event: 'INSERT',
      schema: 'public',
      table: 'chat_messages'
    },
    (payload) => {
      const newMsg = payload.new;

      if (!chatLog.some(m => m.id === newMsg.id)) {
        chatLog.push(newMsg);

        if (chatPanel.classList.contains("open")) {
          appendMsg(newMsg);
        }
      }
    }
  )
  .subscribe((status) => {
  console.log('Chat subscription status:', status);
});
}

// ====================== INITIALIZE ======================

document.getElementById("chatSend").addEventListener("click", sendMsg);
chatInput.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMsg();
  }
});

// Auto-init when script runs
initRealtimeChat();

  await loadProfile();
  await loadMyBets();
  await loadPredictions();
  await loadLeaderboard();
</script>
