<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Prophetly</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #07090f;
      --surface:   #0d1117;
      --border:    rgba(255,255,255,0.07);
      --accent:    #5cefb0;
      --accent2:   #3b82f6;
      --danger:    #f87171;
      --text:      #e8eaf0;
      --muted:     #6b7280;
      --input-bg:  #111827;
      --glow:      rgba(92,239,176,0.18);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
    }

    /* ── BACKGROUND CANVAS ── */
    #bg-canvas {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
    }

    /* ── LAYOUT ── */
    .scene {
      position: relative; z-index: 1;
      display: flex; align-items: center; justify-content: center;
      height: 100vh; padding: 20px;
    }

    /* ── CARD ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 48px 44px;
      width: 100%; max-width: 420px;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.03),
        0 32px 80px rgba(0,0,0,0.7),
        0 0 60px var(--glow);
      animation: cardIn 0.6s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes cardIn {
      from { opacity:0; transform: translateY(28px) scale(0.97); }
      to   { opacity:1; transform: translateY(0)    scale(1); }
    }

    /* ── LOGO ── */
    .logo-row {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 36px;
    }
    .logo-icon {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: grid; place-items: center;
      font-size: 18px; flex-shrink: 0;
      box-shadow: 0 0 20px var(--glow);
    }
    .logo-text {
      font-family: 'Syne', sans-serif;
      font-weight: 800; font-size: 24px; letter-spacing: -0.5px;
    }
    .logo-text span { color: var(--accent); }

    /* ── HEADING ── */
    .card-heading {
      font-family: 'Syne', sans-serif;
      font-size: 20px; font-weight: 700;
      margin-bottom: 6px;
    }
    .card-sub {
      color: var(--muted); font-size: 14px; font-weight: 300;
      margin-bottom: 32px;
    }

    /* ── TABS ── */
    .tabs {
      display: flex; gap: 0;
      background: var(--input-bg);
      border-radius: 12px; padding: 4px;
      margin-bottom: 28px;
    }
    .tab {
      flex: 1; padding: 9px 0; border: none; background: transparent;
      color: var(--muted); font-family: 'DM Sans', sans-serif;
      font-size: 14px; font-weight: 500; cursor: pointer;
      border-radius: 9px; transition: all 0.25s;
    }
    .tab.active {
      background: #1e293b;
      color: var(--text);
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }

    /* ── INPUTS ── */
    .field { margin-bottom: 14px; }
    .field label {
      display: block; font-size: 12px; font-weight: 500;
      color: var(--muted); margin-bottom: 6px; letter-spacing: 0.4px;
      text-transform: uppercase;
    }
    .field input {
      width: 100%; padding: 13px 16px;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 12px; color: var(--text);
      font-family: 'DM Sans', sans-serif; font-size: 15px;
      outline: none; transition: border-color 0.2s, box-shadow 0.2s;
    }
    .field input::placeholder { color: #374151; }
    .field input:focus {
      border-color: rgba(92,239,176,0.4);
      box-shadow: 0 0 0 3px rgba(92,239,176,0.08);
    }

    /* ── BUTTONS ── */
    .btn-primary {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, var(--accent) 0%, #38d9a9 100%);
      border: none; border-radius: 12px;
      color: #07090f; font-family: 'Syne', sans-serif;
      font-size: 15px; font-weight: 700; letter-spacing: 0.2px;
      cursor: pointer; margin-top: 8px;
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 24px rgba(92,239,176,0.25);
    }
    .btn-primary:hover { opacity: 0.92; transform: translateY(-1px); box-shadow: 0 8px 32px rgba(92,239,176,0.35); }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .btn-ghost {
      width: 100%; padding: 11px;
      background: transparent;
      border: 1px solid var(--border); border-radius: 12px;
      color: var(--muted); font-family: 'DM Sans', sans-serif;
      font-size: 14px; font-weight: 500; cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      margin-top: 10px;
    }
    .btn-ghost:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }

    /* ── TOAST ── */
    #toast {
      position: fixed; top: 24px; left: 50%; transform: translateX(-50%) translateY(-80px);
      background: #1e293b; border: 1px solid var(--border);
      border-radius: 12px; padding: 12px 20px;
      font-size: 14px; font-weight: 500; color: var(--text);
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      z-index: 9999; transition: transform 0.35s cubic-bezier(0.22,1,0.36,1);
      white-space: nowrap;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }
    #toast.error { border-color: rgba(248,113,113,0.4); color: var(--danger); }
    #toast.success { border-color: rgba(92,239,176,0.4); color: var(--accent); }

    /* ── SPINNER ── */
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(7,9,15,0.3);
      border-top-color: #07090f;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: inline-block; vertical-align: middle; margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── DIVIDER ── */
    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 22px 0 18px; color: var(--muted); font-size: 12px;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    /* ── DASHBOARD ── */
    .dash-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 28px;
    }
    .dash-user { font-size: 13px; color: var(--muted); margin-top: 2px; }

    .stat-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: var(--input-bg); border: 1px solid var(--border);
      border-radius: 14px; padding: 18px;
    }
    .stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.6px; color: var(--muted); margin-bottom: 8px; }
    .stat-value { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 700; }
    .stat-value.green { color: var(--accent); }
    .stat-value.blue  { color: var(--accent2); }

    .badge {
      display: inline-block; padding: 3px 10px;
      background: rgba(92,239,176,0.1); border: 1px solid rgba(92,239,176,0.2);
      border-radius: 100px; color: var(--accent); font-size: 11px; font-weight: 600;
    }

    .hidden { display: none !important; }
    .view { animation: cardIn 0.45s cubic-bezier(0.22,1,0.36,1) both; }
  </style>
</head>
<body>

<!-- Background -->
<canvas id="bg-canvas"></canvas>

<!-- Toast -->
<div id="toast"></div>

<div class="scene">

  <!-- ── LOGIN VIEW ── -->
  <div id="loginView" class="card view">
    <div class="logo-row">
      <div class="logo-icon">⚡</div>
      <div class="logo-text">Prophet<span>ly</span></div>
    </div>

    <div class="tabs">
      <button class="tab active" id="tabLogin" onclick="switchTab('login')">Sign In</button>
      <button class="tab" id="tabSignup" onclick="switchTab('signup')">Create Account</button>
    </div>

    <div id="formLogin">
      <div class="field"><label>Email</label><input id="loginEmail" type="email" placeholder="you@example.com" autocomplete="email" /></div>
      <div class="field"><label>Password</label><input id="loginPassword" type="password" placeholder="••••••••" autocomplete="current-password" /></div>
      <button class="btn-primary" id="loginBtn">Sign In</button>
    </div>

    <div id="formSignup" class="hidden">
      <div class="field"><label>Email</label><input id="signupEmail" type="email" placeholder="you@example.com" autocomplete="email" /></div>
      <div class="field"><label>Password</label><input id="signupPassword" type="password" placeholder="Min. 8 characters" autocomplete="new-password" /></div>
      <div class="field"><label>Confirm Password</label><input id="signupConfirm" type="password" placeholder="••••••••" autocomplete="new-password" /></div>
      <button class="btn-primary" id="signupBtn">Create Account</button>
    </div>
  </div>

  <!-- ── DASHBOARD VIEW ── -->
  <div id="appView" class="card view hidden">
    <div class="dash-header">
      <div>
        <div class="logo-row" style="margin-bottom:4px">
          <div class="logo-icon">⚡</div>
          <div class="logo-text">Prophet<span>ly</span></div>
        </div>
        <div class="dash-user" id="dashEmail">—</div>
      </div>
      <span class="badge">Active</span>
    </div>

    <div class="stat-grid">
      <div class="stat-card">
        <div class="stat-label">Balance</div>
        <div class="stat-value green" id="dashBalance">$0.00</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Win Rate</div>
        <div class="stat-value blue">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Picks</div>
        <div class="stat-value">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Streak</div>
        <div class="stat-value">🔥 0</div>
      </div>
    </div>

    <div class="divider">account</div>
    <button class="btn-ghost" id="logoutBtn">Sign Out</button>
  </div>

</div>

<!-- ─────────────────────────────────────────── SCRIPTS ─── -->
<script type="module">
  import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

  /* ── Supabase ── */
  const supabase = createClient(
    "https://yjeedgcveawterfpvnuc.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlqZWVkZ2N2ZWF3dGVyZnB2bnVjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0MzU3MjYsImV4cCI6MjA5MjAxMTcyNn0.nAcKJcUjVZW8-qrPm3n9XDvoqUm4jcD3srZwJkPuUBU",
    {
      auth: {
        persistSession: true,          // saves session to localStorage
        autoRefreshToken: true,         // silently refreshes JWT
        detectSessionInUrl: true
      }
    }
  );

  /* ── DOM refs ── */
  const loginView  = document.getElementById("loginView");
  const appView    = document.getElementById("appView");
  const dashEmail  = document.getElementById("dashEmail");
  const loginBtn   = document.getElementById("loginBtn");
  const signupBtn  = document.getElementById("signupBtn");
  const logoutBtn  = document.getElementById("logoutBtn");
  const toast      = document.getElementById("toast");

  /* ── Toast ── */
  let toastTimer;
  function showToast(msg, type = "info") {
    toast.className = type;
    toast.textContent = msg;
    void toast.offsetWidth;
    toast.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove("show"), 3500);
  }

  /* ── Loading state ── */
  function setLoading(btn, loading, label) {
    btn.disabled = loading;
    btn.innerHTML = loading
      ? `<span class="spinner"></span>${label}`
      : label;
  }

  /* ── Views ── */
  function showApp(user) {
    loginView.classList.add("hidden");
    appView.classList.remove("hidden");
    dashEmail.textContent = user.email;
    syncUserToMongo(user);
  }

  function showLogin() {
    appView.classList.add("hidden");
    loginView.classList.remove("hidden");
  }

  /* ── MongoDB sync via Vercel API route ──
     The Vercel function reads MONGODB_URI from env — never exposed here. */
  async function syncUserToMongo(user) {
    try {
      const { data: { session } } = await supabase.auth.getSession();
      await fetch("/api/user", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          // Pass Supabase JWT so the API route can verify the request
          "Authorization": `Bearer ${session?.access_token ?? ""}`
        },
        body: JSON.stringify({
          supabase_uid: user.id,
          email: user.email,
          last_login: new Date().toISOString()
        })
      });
    } catch (err) {
      // Non-fatal — auth still works
      console.warn("Mongo sync failed:", err.message);
    }
  }

  /* ── Session restore on load ── */
  const { data: { session } } = await supabase.auth.getSession();
  if (session) {
    showApp(session.user);
  } else {
    showLogin();
  }

  /* Listen for auth state changes (tab focus, token refresh, etc.) */
  supabase.auth.onAuthStateChange((_event, session) => {
    if (session) showApp(session.user);
    else         showLogin();
  });

  /* ── Tab switch ── */
  window.switchTab = (tab) => {
    document.getElementById("tabLogin").classList.toggle("active",  tab === "login");
    document.getElementById("tabSignup").classList.toggle("active", tab === "signup");
    document.getElementById("formLogin").classList.toggle("hidden", tab !== "login");
    document.getElementById("formSignup").classList.toggle("hidden", tab !== "signup");
  };

  /* ── Login ── */
  loginBtn.addEventListener("click", async () => {
    const email    = document.getElementById("loginEmail").value.trim();
    const password = document.getElementById("loginPassword").value;
    if (!email || !password) return showToast("Fill in all fields.", "error");

    setLoading(loginBtn, true, "Signing in…");
    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
    setLoading(loginBtn, false, "Sign In");

    if (error) { showToast(error.message, "error"); return; }
    showToast("Welcome back! 👋", "success");
    showApp(data.user);
  });

  /* ── Sign Up ── */
  signupBtn.addEventListener("click", async () => {
    const email    = document.getElementById("signupEmail").value.trim();
    const password = document.getElementById("signupPassword").value;
    const confirm  = document.getElementById("signupConfirm").value;
    if (!email || !password || !confirm) return showToast("Fill in all fields.", "error");
    if (password !== confirm)            return showToast("Passwords don't match.", "error");
    if (password.length < 8)             return showToast("Password must be 8+ characters.", "error");

    setLoading(signupBtn, true, "Creating account…");
    const { data, error } = await supabase.auth.signUp({ email, password });
    setLoading(signupBtn, false, "Create Account");

    if (error) { showToast(error.message, "error"); return; }
    showToast("Account created — welcome! 🎉", "success");
    if (data.user) showApp(data.user);
  });

  /* ── Logout ── */
  logoutBtn.addEventListener("click", async () => {
    await supabase.auth.signOut();
    showToast("Signed out.", "info");
    showLogin();
  });
</script>

<!-- Background particle canvas -->
<script>
  const canvas = document.getElementById("bg-canvas");
  const ctx = canvas.getContext("2d");

  function resize() { canvas.width = innerWidth; canvas.height = innerHeight; }
  resize(); window.addEventListener("resize", resize);

  const DOTS = Array.from({ length: 60 }, () => ({
    x: Math.random() * innerWidth,
    y: Math.random() * innerHeight,
    r: Math.random() * 1.4 + 0.3,
    dx: (Math.random() - 0.5) * 0.18,
    dy: (Math.random() - 0.5) * 0.18,
    a: Math.random() * 0.35 + 0.05
  }));

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (const d of DOTS) {
      d.x += d.dx; d.y += d.dy;
      if (d.x < 0 || d.x > canvas.width)  d.dx *= -1;
      if (d.y < 0 || d.y > canvas.height) d.dy *= -1;
      ctx.beginPath();
      ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(92,239,176,${d.a})`;
      ctx.fill();
    }
    requestAnimationFrame(draw);
  }
  draw();
</script>

</body>
</html>
