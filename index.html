<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Prophetly</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0f1a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: #111827;
      padding: 40px;
      border-radius: 16px;
      width: 320px;
      text-align: center;
      box-shadow: 0 0 30px rgba(0,0,0,0.5);
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 8px;
      border: none;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      background: #4f46e5;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .hidden {
      display: none;
    }
  </style></head>
<body>  <!-- LOGIN VIEW -->  <div id="loginView" class="card">
    <h1>Prophetly</h1>
    <p>Play smarter.</p><input id="email" type="email" placeholder="Email" />
<input id="password" type="password" placeholder="Password" />

<button id="loginBtn">Login</button>
<button id="signupBtn">Sign Up</button>

  </div>  <!-- DASHBOARD VIEW -->  <div id="appView" class="card hidden">
    <h2 id="welcome"></h2>
    <p>Balance: $0.00 💀</p>
    <button id="logoutBtn">Logout</button>
  </div>  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

    const supabase = createClient(
      "https://yjeedgcveawterfpvnuc.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlqZWVkZ2N2ZWF3dGVyZnB2bnVjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0MzU3MjYsImV4cCI6MjA5MjAxMTcyNn0.nAcKJcUjVZW8-qrPm3n9XDvoqUm4jcD3srZwJkPuUBU"
    );

    const loginView = document.getElementById("loginView");
    const appView = document.getElementById("appView");
    const welcome = document.getElementById("welcome");

    function showApp(user) {
      loginView.classList.add("hidden");
      appView.classList.remove("hidden");
      welcome.innerText = "Welcome " + user.email + " 😤";
    }

    function showLogin() {
      appView.classList.add("hidden");
      loginView.classList.remove("hidden");
    }

    // AUTO SESSION CHECK
    const { data: { session } } = await supabase.auth.getSession();
    if (session) {
      showApp(session.user);
    } else {
      showLogin();
    }

    // LOGIN
    document.getElementById("loginBtn").addEventListener("click", async () => {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      const { data, error } = await supabase.auth.signInWithPassword({ email, password });

      if (!error) showApp(data.user);
    });

    // SIGNUP
    document.getElementById("signupBtn").addEventListener("click", async () => {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      const { data, error } = await supabase.auth.signUp({ email, password });

      if (!error) showApp(data.user);
    });

    // LOGOUT
    document.getElementById("logoutBtn").addEventListener("click", async () => {
      await supabase.auth.signOut();
      showLogin();
    });
  </script></body>
</html>
