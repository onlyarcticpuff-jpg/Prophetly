<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Prophetly</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0f1a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
      background: #111827;
      padding: 40px;
      border-radius: 16px;
      width: 320px;
      box-shadow: 0 0 30px rgba(0,0,0,0.5);
    }

    h1 {
      margin-bottom: 10px;
    }

    p {
      opacity: 0.7;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 8px;
      border: none;
      outline: none;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      background: #4f46e5;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #4338ca;
    }

    .status {
      margin-top: 15px;
      font-size: 14px;
      opacity: 0.8;
    }
  </style></head>
<body>  <div class="container">
    <h1>Prophetly</h1>
    <p>Play smarter.</p><input id="email" type="email" placeholder="Email" />
<input id="password" type="password" placeholder="Password" />

<button onclick="login()">Login</button>
<button onclick="signup()">Sign Up</button>

<div class="status" id="status"></div>

  </div>  <!-- Supabase -->  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>  <script>
    const supabase = window.supabase.createClient(
      "https://yjeedgcveawterfpvnuc.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlqZWVkZ2N2ZWF3dGVyZnB2bnVjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0MzU3MjYsImV4cCI6MjA5MjAxMTcyNn0.nAcKJcUjVZW8-qrPm3n9XDvoqUm4jcD3srZwJkPuUBU"
    );

    const status = document.getElementById("status");

    async function login() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      const { error } = await supabase.auth.signInWithPassword({
        email,
        password
      });

      if (error) {
        status.innerText = error.message;
      } else {
        status.innerText = "Logged in 😤";
      }
    }

    async function signup() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      const { error } = await supabase.auth.signUp({
        email,
        password
      });

      if (error) {
        status.innerText = error.message;
      } else {
        status.innerText = "Account created 🔥";
      }
    }
  </script></body>
</html>
